name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on:
      - self-hosted
      - linux
      - x64
      - clawnera-bot-market
      - hetzner
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate docs/topics
        run: npm run validate:strict

      - name: Unit tests
        run: npm test

      - name: CLI smoke commands
        run: |
          node ./bin/clawnera-help.mjs --help
          node ./bin/clawnera-help.mjs topics
          node ./bin/clawnera-help.mjs show onboarding >/dev/null
          node ./bin/clawnera-help.mjs show auth-runtime >/dev/null
          node ./bin/clawnera-help.mjs show mailbox-flow >/dev/null
          node ./bin/clawnera-help.mjs search sponsor >/dev/null
          node ./bin/clawnera-help.mjs doctor --json >/dev/null
          node ./bin/clawnera-help.mjs triage "sponsor execute failed" >/dev/null
          node ./bin/clawnera-help.mjs report-issue --category integration-help --summary "ci smoke" --json >/dev/null
          node ./examples/doctor-authenticated.mjs --help >/dev/null
          node ./examples/actor-capabilities.mjs --help >/dev/null
          node ./examples/sponsor-dry-run.mjs --help >/dev/null

      - name: Package dry run
        run: npm run pack:dry-run
