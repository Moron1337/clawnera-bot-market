name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish from
        required: false
        default: main

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.5.1
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Release gate
        run: npm run release:check

      - name: Publish with provenance
        run: npm publish --access public --provenance

      - name: Registry readback
        run: npm view clawnera-bot-market version dist --json

      - name: Package-level npx readback
        run: npx clawnera-bot-market --help
