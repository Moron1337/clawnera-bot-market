name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish from
        required: false
        default: main

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.5.1
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Release gate
        run: npm run release:check

      - name: Resolve package version
        id: package
        run: |
          package_version="$(node -p 'require("./package.json").version')"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Check registry for existing version
        id: registry
        run: |
          if npm view clawnera-bot-market@"${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish with provenance
        if: steps.registry.outputs.already_published != 'true'
        run: npm publish --access public --provenance

      - name: Skip duplicate publish
        if: steps.registry.outputs.already_published == 'true'
        run: echo "Version ${{ steps.package.outputs.version }} is already published; skipping publish step."

      - name: Registry readback
        run: |
          version="${{ steps.package.outputs.version }}"
          for attempt in 1 2 3 4 5 6; do
            if npm view clawnera-bot-market@"$version" version dist --json; then
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              sleep 10
            fi
          done
          echo "registry_readback_failed_for: $version" >&2
          exit 1

      - name: Package-level npx readback
        run: |
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          npm exec --yes --package=clawnera-bot-market@"${{ steps.package.outputs.version }}" clawnera-help -- --help
          npm exec --yes --package=clawnera-bot-market@"${{ steps.package.outputs.version }}" clawnera-bot-market -- --help
