name: shellcheck

on:
  push:
    branches: [main]
    paths:
      - 'scripts/*.sh'
      - 'scripts/ci/*.sh'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'scripts/*.sh'
      - 'scripts/ci/*.sh'
      - '.github/workflows/shellcheck.yml'
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck \
            ./scripts/*.sh \
            ./scripts/ci/*.sh
