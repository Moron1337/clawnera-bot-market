            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Caller is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    TraderVerificationRequest:
      properties:
        legalName:
          type: string
          minLength: 2
          maxLength: 200
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
        registrationNumber:
          type: string
          minLength: 2
          maxLength: 128
        vatId:
          type: string
          minLength: 2
          maxLength: 128
        contactEmail:
          type: string
          format: email
        website:
          type: string
          format: uri
      type: object
      additionalProperties: false
      required:
        - legalName
        - countryCode
    ComplianceAccountTypeRequest:
      properties:
        accountType:
          type: string
          enum:
            - TRADER
            - CONSUMER
      type: object
      additionalProperties: false
      required:
        - accountType
    UserComplianceProfile:
      properties:
        address:
          type: string
        tier:
          type: integer
          minimum: 0
          maximum: 4
        acceptsClaw:
          type: boolean
        accountType:
          type: string
          enum:
            - TRADER
            - CONSUMER
        traderVerificationStatus:
          type: string
          enum:
            - NOT_SUBMITTED
            - PENDING
            - VERIFIED
            - REJECTED
        traderVerificationPayload:
          $ref: '#/components/schemas/TraderVerificationPayload'
        traderVerificationNote:
          type: string
        traderVerificationUpdatedAt:
          type: string
          format: date-time
        isBot:
          type: boolean
      type: object
      required:
        - address
        - tier
        - acceptsClaw
        - accountType
        - traderVerificationStatus
        - traderVerificationUpdatedAt
        - isBot
    TraderVerificationPayload:
      properties:
        legalName:
          type: string
        countryCode:
          type: string
        registrationNumber:
          type: string
        vatId:
          type: string
        contactEmail:
          type: string
          format: email
        website:
          type: string
          format: uri
      type: object
    ComplianceAppealCase:
      properties:
        id:
          type: string
        noticeId:
          type: string
        appellantAddress:
          type: string
        appellantContact:
          type: string
        reason:
          type: string
        details:
          type: string
        evidenceUrls:
          type: array
          items:
            type: string
        status:
          type: string
          enum:
            - OPEN
            - IN_REVIEW
            - CLOSED
        retentionClass:
          type: string
        reviewerAddress:
          type: string
        decisionOutcome:
          type: string
          enum:
            - UPHELD
            - MODIFIED
            - REVERSED
        decisionSummary:
          type: string
        legalBasis:
          type: string
        decidedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      type: object
      required:
        - id
        - noticeId
        - reason
        - details
        - evidenceUrls
        - status
        - retentionClass
        - createdAt
        - updatedAt
    AppealCaseCreateRequest:
      properties:
        noticeId:
          type: string
          minLength: 1
          maxLength: 128
        reason:
          type: string
          minLength: 3
          maxLength: 320
        details:
          type: string
          minLength: 8
          maxLength: 4000
        appellantContact:
          type: string
          minLength: 3
          maxLength: 320
        evidenceUrls:
          type: array
          maxItems: 6
          items:
            type: string
            format: uri
      type: object
      additionalProperties: false
      required:
        - noticeId
        - reason
        - details
    ModerationNotice:
      properties:
        id:
          type: string
        reporterAddress:
          type: string
        reporterContact:
          type: string
        targetType:
          type: string
          enum:
            - LISTING
            - BID
            - ORDER
            - PROFILE
            - OTHER
        targetId:
          type: string
        targetAddress:
          type: string
        reasonCode:
          type: string
          enum:
            - ILLEGAL_CONTENT
            - SCAM
            - FRAUD
            - IP
            - OTHER
        details:
          type: string
        evidenceUrls:
          type: array
          items:
            type: string
        status:
          type: string
          enum:
            - OPEN
            - IN_REVIEW
            - ACTION_TAKEN
            - REJECTED
        moderatorAddress:
          type: string
        decisionAction:
          type: string
          enum:
            - NONE
            - REMOVE
            - RESTRICT
            - SUSPEND
        decisionReason:
          type: string
        legalBasis:
          type: string
        decidedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      type: object
      required:
        - id
        - targetType
        - targetId
        - reasonCode
        - details
        - evidenceUrls
        - status
        - createdAt
        - updatedAt
    NoticeActionCreateRequest:
      properties:
        targetType:
          type: string
          enum:
            - LISTING
            - BID
            - ORDER
            - PROFILE
            - OTHER
        targetId:
          type: string
          minLength: 1
          maxLength: 256
        targetAddress:
          type: string
        reasonCode:
          type: string
          enum:
            - ILLEGAL_CONTENT
            - SCAM
            - FRAUD
            - IP
            - OTHER
        details:
          type: string
          minLength: 8
          maxLength: 4000
        reporterContact:
          type: string
          minLength: 3
          maxLength: 320
        evidenceUrls:
          type: array
          maxItems: 6
          items:
            type: string
            format: uri
      type: object
      additionalProperties: false
      required:
        - targetType
        - targetId
        - reasonCode
        - details
    SponsorExecuteResponse:
      properties:
        execution:
          $ref: '#/components/schemas/SponsorExecuteResult'
      type: object
      additionalProperties: false
      required:
        - execution
    SponsorExecuteResult:
      properties:
        reservationId:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - submitted
            - accepted
        txDigest:
          type: string
          minLength: 1
      type: object
      additionalProperties: false
      required:
        - reservationId
        - status
        - txDigest
    SponsorExecuteRequest:
      properties:
        reservationId:
          type: string
          minLength: 1
          maxLength: 256
        txBytesB64:
          type: string
          minLength: 1
        userSig:
          type: string
          minLength: 1
        orderId:
          type: string
          minLength: 1
          maxLength: 200
          description: Canonical order identifier for order-scoped sponsor policy evaluation.
        intent:
          $ref: '#/components/schemas/SponsorExecutionIntentRequest'
        intentSig:
          type: string
          minLength: 1
          maxLength: 8192
          description: >
            Serialized wallet personal-message signature over the canonical

            sponsor intent message:

            first line `CLAWDEX Sponsor Execute Intent v1`, second line

            `network=<network>|order_id=<orderId>|reservation_id=<reservationId>|tx_digest=<txDigest>|expires_at=<expiresAt>|purpose=<purpose>`.

            Required whenever `intent` is provided.
      type: object
      additionalProperties: false
      required:
        - reservationId
        - txBytesB64
        - userSig
    SponsorExecutionIntentRequest:
      properties:
        network:
          type: string
          minLength: 1
          maxLength: 64
        orderId:
          type: string
          minLength: 1
          maxLength: 200
        reservationId:
          type: string
          minLength: 1
          maxLength: 256
        txDigest:
          type: string
          pattern: ^[a-f0-9]{64}$
        expiresAt:
          type: string
          format: date-time
        purpose:
          type: string
          minLength: 1
          maxLength: 64
      type: object
      additionalProperties: false
      required:
        - network
        - orderId
        - reservationId
        - txDigest
        - expiresAt
        - purpose
    SponsorReserveResponse:
      properties:
        reservation:
          $ref: '#/components/schemas/SponsorReservationResponse'
        usage:
          $ref: '#/components/schemas/SponsorUsage'
        caps:
          properties:
            maxTxCount:
              type: integer
              minimum: 0
            maxGasPerDay:
              type: integer
