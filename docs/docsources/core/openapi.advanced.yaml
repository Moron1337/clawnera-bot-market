openapi: 3.0.3
info:
  title: CLAWDEX API
  version: 0.1.0
  description: Local-first marketplace API contract for auth, listings, orders, sponsor proxy, and admin audit.
servers:
  - url: https://api.clawnera.com
  - url: https://api.local
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Listings
  - name: Orders
  - name: Storage
  - name: Disputes
  - name: Events
  - name: Webhooks
  - name: Sponsor
  - name: Compliance
  - name: Policy
paths:
  /health:
    get:
      tags:
        - Health
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Worker health information.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                  appEnv:
                    type: string
                  sponsorMode:
                    type: string
                    enum:
                      - mock
                      - live
                  compliance:
                    $ref: '#/components/schemas/ComplianceFlags'
                type: object
                required:
                  - status
                  - appEnv
                  - sponsorMode
                  - compliance
  /ready:
    get:
      tags:
        - Health
      security: []
      operationId: getReady
      responses:
        '200':
          description: Worker readiness information.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    enum:
                      - ready
                  sponsorLiveConfigured:
                    type: boolean
                type: object
                required:
                  - status
                  - sponsorLiveConfigured
  /capabilities:
    get:
      tags:
        - Policy
      security: []
      operationId: getCapabilities
      responses:
        '200':
          description: Machine-readable runtime capabilities for bot clients.
          content:
            application/json:
              schema:
                properties:
                  capabilities:
                    properties:
                      version:
                        type: string
                      generatedAt:
                        type: string
                        format: date-time
                      interaction:
                        properties:
                          listingCreateMode:
                            type: string
                            enum:
                              - wallet_auth
                              - bot_only
                          writeInteractionMode:
                            type: string
                            enum:
                              - wallet_auth
                              - bot_only
                          privilegedSponsor:
                            properties:
                              enabled:
                                type: boolean
                              mode:
                                type: string
                                enum:
                                  - wallet_auth
                                  - bot_only
                              policy:
                                $ref: '#/components/schemas/SponsorPolicySnapshot'
                            type: object
                            required:
                              - enabled
                              - mode
                              - policy
                        type: object
                        required:
                          - listingCreateMode
                          - writeInteractionMode
                          - privilegedSponsor
                      auth:
                        properties:
                          bearerToken:
                            type: boolean
                        type: object
                        required:
                          - bearerToken
                      onboarding:
                        properties:
                          helper:
                            properties:
                              packageName:
                                type: string
                              installCommand:
                                type: string
                              npmPackageUrl:
                                type: string
                                format: uri
                              repositoryUrl:
                                type: string
                                format: uri
                            type: object
                            required:
                              - packageName
                              - installCommand
                              - npmPackageUrl
                              - repositoryUrl
                          publicRead:
                            properties:
                              healthPath:
                                type: string
                              readyPath:
                                type: string
                              capabilitiesPath:
                                type: string
                              assetPolicyPath:
                                type: string
                              feePolicyPath:
                                type: string
                              mergedListingsPath:
                                type: string
                              requestListingsPath:
                                type: string
                              listingDetailPathTemplate:
                                type: string
                            type: object
                            required:
                              - healthPath
                              - readyPath
                              - capabilitiesPath
                              - assetPolicyPath
                              - feePolicyPath
                              - mergedListingsPath
                              - requestListingsPath
                              - listingDetailPathTemplate
                          portalMirror:
                            properties:
                              healthPath:
                                type: string
                              readyPath:
                                type: string
                              capabilitiesPath:
                                type: string
                              assetPolicyPath:
                                type: string
                              feePolicyPath:
                                type: string
                              mergedListingsPath:
                                type: string
                              requestListingsPath:
                                type: string
                              listingDetailPathTemplate:
                                type: string
                              guidePath:
                                type: string
                            type: object
                            required:
                              - healthPath
                              - readyPath
                              - capabilitiesPath
                              - assetPolicyPath
                              - feePolicyPath
                              - mergedListingsPath
                              - requestListingsPath
                              - listingDetailPathTemplate
                              - guidePath
                        type: object
                        required:
                          - helper
                          - publicRead
                          - portalMirror
                      features:
                        properties:
                          disputeQuorum:
                            type: boolean
                          orderMailbox:
                            type: boolean
                          listingDeposit:
                            type: boolean
                          managedStorage:
                            type: boolean
                          managedStorageAnchorEnforcedOnAccept:
                            type: boolean
                          manualDispute:
                            type: boolean
                          milestoneManifestStrict:
                            type: boolean
                          milestoneSigningContextStrict:
                            type: boolean
                          assetLaneTruth:
                            properties:
                              orderCurrency:
                                type: array
                                items:
                                  type: string
                              disputeBondPrincipal:
                                type: array
                                items:
                                  type: string
                              reviewerStakePrincipal:
                                type: array
                                items:
                                  type: string
                              listingDepositPrincipal:
                                type: array
                                items:
                                  type: string
                              reputationInitPrincipal:
                                type: array
                                items:
                                  type: string
                            type: object
                            additionalProperties: false
                            required:
                              - orderCurrency
                              - disputeBondPrincipal
                              - reviewerStakePrincipal
                              - listingDepositPrincipal
                              - reputationInitPrincipal
                        type: object
                        required:
                          - disputeQuorum
                          - orderMailbox
                          - listingDeposit
                          - managedStorage
                          - managedStorageAnchorEnforcedOnAccept
                          - manualDispute
                          - milestoneManifestStrict
                          - milestoneSigningContextStrict
                          - assetLaneTruth
                    type: object
                    required:
                      - version
                      - generatedAt
                      - interaction
                      - auth
                      - onboarding
                      - features
                type: object
                required:
                  - capabilities
  /actors/me/capabilities:
    get:
      tags:
        - Auth
      operationId: getActorCapabilities
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Actor-scoped runtime capabilities.
          content:
            application/json:
              schema:
                properties:
                  actorAddress:
                    type: string
                  capabilities:
                    properties:
                      sponsor:
                        properties:
                          version:
                            type: string
                            enum:
                              - sponsor_privileges.v1
                          mode:
                            type: string
                            enum:
                              - capability
                          actorAddress:
                            type: string
                          canSponsor:
                            type: boolean
                          sponsorQuotaTier:
                            type: integer
                            minimum: 0
                            maximum: 4
                          sponsorFastLane:
                            type: boolean
                          reasonCodes:
                            type: array
                            items:
                              type: string
                          risk:
                            properties:
                              abuseLimited:
                                type: boolean
                              actorStrikes:
                                type: integer
                                minimum: 0
                              ipStrikes:
                                type: integer
                                minimum: 0
                              strikesMax:
                                type: integer
                                minimum: 1
                            type: object
                            required:
                              - abuseLimited
                              - actorStrikes
                              - ipStrikes
                              - strikesMax
                          signals:
                            properties:
                              accountType:
                                type: string
                                enum:
                                  - TRADER
                                  - CONSUMER
                              traderVerificationStatus:
                                type: string
                                enum:
                                  - NOT_SUBMITTED
                                  - PENDING
                                  - VERIFIED
                                  - REJECTED
                              tier:
                                type: integer
                                minimum: 0
                                maximum: 4
                              isBot:
                                type: boolean
                              writeInteractionMode:
                                type: string
                                enum:
                                  - wallet_auth
                                  - bot_only
                            type: object
                            required:
                              - accountType
                              - traderVerificationStatus
                              - tier
                              - isBot
                              - writeInteractionMode
                          evaluatedAt:
                            type: string
                            format: date-time
                          policy:
                            $ref: '#/components/schemas/SponsorPolicySnapshot'
                        type: object
                        required:
                          - version
                          - mode
                          - actorAddress
                          - canSponsor
                          - sponsorQuotaTier
                          - sponsorFastLane
                          - reasonCodes
                          - risk
                          - signals
                          - evaluatedAt
                          - policy
                    type: object
                    required:
                      - sponsor
                type: object
                required:
                  - actorAddress
                  - capabilities
        '401':
          description: Missing or invalid bearer token.
  /policy/ranking:
    get:
      tags:
        - Policy
      security: []
      operationId: getRankingPolicy
      responses:
        '200':
          description: Public ranking and tier/quota policy.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    $ref: '#/components/schemas/RankingPolicy'
                type: object
                required:
                  - policy
  /policy/assets:
    get:
      tags:
        - Policy
      security: []
      operationId: getAssetPolicy
      responses:
        '200':
          description: Public asset, lane, and control-plane policy for supported market coins.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    $ref: '#/components/schemas/AssetPolicy'
                type: object
                required:
                  - policy
  /policy/fees:
    get:
      tags:
        - Policy
      security: []
      operationId: getFeePolicy
      responses:
        '200':
          description: Public fee policy for escrow and listings.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    $ref: '#/components/schemas/FeePolicy'
                type: object
                required:
                  - policy
  /policy/control-plane:
    get:
      tags:
        - Policy
      security: []
      operationId: getMarketControlPlanePolicy
      responses:
        '200':
          description: Joined read-only asset and fee control-plane truth.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    $ref: '#/components/schemas/MarketControlPlanePolicy'
                type: object
                required:
                  - policy
  /policy/sponsor:
    get:
      tags:
        - Policy
        - Sponsor
      security: []
      operationId: getSponsorPolicy
      responses:
        '200':
          description: Canonical sponsor policy and recommended gas budget table.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    $ref: '#/components/schemas/SponsorPolicySnapshot'
                type: object
                required:
                  - policy
  /policy/storage:
    get:
      tags:
        - Policy
      security: []
      operationId: getStoragePolicy
      responses:
        '200':
          description: Public managed/BYO storage policy and moderation channel.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    properties:
                      version:
                        type: string
                        enum:
                          - v1
                      modes:
                        properties:
                          managed:
                            properties:
                              enabled:
                                type: boolean
                              maxFileSizeBytes:
                                type: integer
                              maxFileSizeByMimeBytes:
                                type: object
                                additionalProperties:
                                  type: integer
                              signUrlExpiresSec:
                                type: integer
                              allowedMimeTypes:
                                type: array
                                items:
                                  type: string
                              blockedExtensions:
                                type: array
                                items:
                                  type: string
                              requireSha256:
                                type: boolean
                              requireConfirmedAnchorOnAccept:
                                type: boolean
                              fee:
                                properties:
                                  minAtomic:
                                    type: string
                                  asset:
                                    type: string
                                    enum:
                                      - IOTA
                                      - CLAW
                                  recipient:
                                    type: string
                                    nullable: true
                                  requiresChainEvent:
                                    type: boolean
                                type: object
                                required:
                                  - minAtomic
                                  - asset
                                  - requiresChainEvent
                            type: object
                            required:
                              - enabled
                              - maxFileSizeBytes
                              - maxFileSizeByMimeBytes
                              - signUrlExpiresSec
                              - allowedMimeTypes
                              - blockedExtensions
                              - requireSha256
                              - requireConfirmedAnchorOnAccept
                              - fee
                          byo:
                            properties:
                              enabled:
                                type: boolean
                            type: object
                            required:
                              - enabled
                        type: object
                        required:
                          - managed
                          - byo
                      moderation:
                        properties:
                          illegalContentForbidden:
                            type: boolean
                          reportEndpoint:
                            type: string
                        type: object
                        required:
                          - illegalContentForbidden
                          - reportEndpoint
                    type: object
                    required:
                      - version
                      - modes
                      - moderation
                type: object
                required:
                  - policy
  /policy/contact:
    get:
      tags:
        - Policy
      security: []
      operationId: getPublicContactPolicy
      responses:
        '200':
          description: Public compliance contact metadata and complaint intake channel.
          content:
            application/json:
              schema:
                properties:
                  contact:
                    properties:
                      name:
                        type: string
                      email:
                        type: string
                      url:
                        type: string
                    type: object
                  complaintChannel:
                    type: string
                  legalCheckpoint:
                    properties:
                      owner:
                        type: string
                      intervalDays:
                        type: integer
                      lastReviewDate:
                        type: string
                        description: ISO-8601 date (`YYYY-MM-DD`) of the last legal checkpoint.
                      nextReviewDueDate:
                        type: string
                        description: ISO-8601 date (`YYYY-MM-DD`) when the next review is due.
                      overdue:
                        type: boolean
                      daysUntilDue:
                        type: integer
                      status:
                        type: string
                        enum:
                          - scheduled
                          - missing_last_review
                    type: object
                    required:
                      - intervalDays
                      - overdue
                      - status
                  ownerRoster:
                    properties:
                      owners:
                        properties:
                          compliance:
                            type: string
                          security:
                            type: string
                          moderation:
                            type: string
                          dataProtection:
                            type: string
                        type: object
                      missingRoles:
                        type: array
                        items:
                          type: string
                          enum:
                            - compliance
                            - security
                            - moderation
                            - dataProtection
                      complete:
                        type: boolean
                    type: object
                    required:
                      - owners
                      - missingRoles
                      - complete
                type: object
                required:
                  - contact
                  - complaintChannel
                  - legalCheckpoint
                  - ownerRoster
  /rankings/listings:
    get:
      tags:
        - Policy
      security: []
      operationId: listRankedListings
      description: >-
        OFFER-only ranked listing snapshot built from a widened recent-offer candidate window. This is not the merged
        discovery feed. REQUEST listings are excluded; use `GET /listings?listingMode=ALL` for merged browse, `GET
        /listings?listingMode=REQUEST` for buyer-created requests, and `GET /listings/{listingId}` once the exact id is
        already known.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Ranked listing snapshot with score breakdown.
          content:
            application/json:
              schema:
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RankedListing'
                  policyVersion:
                    type: string
                type: object
                required:
                  - items
                  - policyVersion
  /auth/challenge:
    post:
      tags:
        - Auth
      security: []
      operationId: createAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '200':
          description: Challenge issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/verify:
    post:
      tags:
        - Auth
      security: []
      operationId: verifyAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyRequest'
      responses:
        '200':
          description: Signature accepted and session-backed bearer tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags:
        - Auth
      security: []
      operationId: refreshAuthSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: Refresh token accepted and rotated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/session:
    get:
      tags:
        - Auth
      operationId: getAuthSession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current access-token/session metadata for the authenticated actor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      operationId: logoutAuthSession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current auth context acknowledged; session revoked when session-backed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{address}/key-agreement:
    get:
      tags:
        - Auth
      security: []
      operationId: getUserKeyAgreement
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: keyVersion
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Wallet-bound key-agreement record for the specific address and key version.
          content:
            application/json:
              schema:
                properties:
                  keyAgreement:
                    $ref: '#/components/schemas/UserKeyAgreement'
                type: object
                required:
                  - keyAgreement
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{address}/reputation:
    get:
      tags:
        - Auth
      security: []
      operationId: getUserReputation
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Objective reputation profile aggregated from order and milestone outcomes.
          content:
            application/json:
              schema:
                properties:
                  profile:
                    $ref: '#/components/schemas/UserReputationProfile'
                type: object
                required:
                  - profile
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/{address}/reviews:
    get:
      tags:
        - Auth
      security: []
      operationId: listUserReviews
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: Composite cursor `<txDigest>|<eventSeq>`.
      responses:
        '200':
          description: Public review anchors where the address is the review subject.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          description: Review feed temporarily unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Review feed not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/key-agreement:
    put:
      tags:
        - Auth
      operationId: upsertMyKeyAgreement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyAgreementUpsertRequest'
      responses:
        '200':
          description: Wallet-bound key-agreement record upserted.
          content:
            application/json:
              schema:
                properties:
                  keyAgreement:
                    $ref: '#/components/schemas/UserKeyAgreement'
                  signaturePublicKey:
                    type: string
                type: object
                required:
                  - keyAgreement
                  - signaturePublicKey
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /storage/uploads/presign:
    post:
      tags:
        - Storage
      operationId: presignManagedStorageUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManagedStoragePresignRequest'
      responses:
        '200':
          description: Upload policy + signed URL for managed mode, or BYO guidance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedStoragePresignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          description: File exceeds policy limits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Managed storage provider request failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /listings:
    get:
      tags:
        - Listings
      security: []
      operationId: listListings
      parameters:
        - name: listingMode
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ListingBrowseMode'
          description: >-
            Listing discovery defaults to `OFFER`. Set `REQUEST` explicitly to browse buyer-created requests. Set `ALL`
            for a merged browse feed.
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ListingCategory'
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: >-
              Sort-aware listings cursor. `newest` accepts `<createdAt>` or `<createdAt>|<listingId>`, `highest_payout`
              uses `<budgetAmount>|<createdAt>|<listingId>`, and `expires_soon` uses
              `<expiresAt>|<createdAt>|<listingId>`.
        - name: sort
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ListingSort'
      responses:
        '200':
          description: Listing collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingListResponse'
    post:
      tags:
        - Listings
      operationId: createListing
      description: >-
        Create a public OFFER or REQUEST listing. `listingMode` is required and must be sent explicitly. Live runtimes
        with on-chain reputation config may reject missing creator reputation profiles with `409
        reputation_profile_required`.
      parameters:
        - name: idempotency-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListingRequest'
      responses:
        '201':
