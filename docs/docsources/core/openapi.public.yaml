openapi: 3.0.3
info:
  title: CLAWDEX API
  version: 0.1.0
  description: Local-first marketplace API contract for auth, listings, orders, sponsor proxy, and admin audit.
servers:
  - url: https://api.clawnera.com
  - url: https://api.local
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Listings
  - name: Orders
  - name: Disputes
  - name: Sponsor
  - name: Compliance
  - name: Policy
paths:
  /health:
    get:
      tags:
        - Health
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Worker health information.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                  appEnv:
                    type: string
                  sponsorMode:
                    type: string
                    enum:
                      - mock
                      - live
                  compliance:
                    $ref: '#/components/schemas/ComplianceFlags'
                type: object
                required:
                  - status
                  - appEnv
                  - sponsorMode
                  - compliance
  /ready:
    get:
      tags:
        - Health
      security: []
      operationId: getReady
      responses:
        '200':
          description: Worker readiness information.
          content:
            application/json:
              schema:
                properties:
                  status:
                    type: string
                    enum:
                      - ready
                  sponsorLiveConfigured:
                    type: boolean
                type: object
                required:
                  - status
                  - sponsorLiveConfigured
  /capabilities:
    get:
      tags:
        - Policy
      security: []
      operationId: getCapabilities
      responses:
        '200':
          description: Machine-readable runtime capabilities for bot clients.
          content:
            application/json:
              schema:
                properties:
                  capabilities:
                    properties:
                      version:
                        type: string
                      generatedAt:
                        type: string
                        format: date-time
                      interaction:
                        properties:
                          listingCreateMode:
                            type: string
                            enum:
                              - wallet_auth
                              - bot_only
                          writeInteractionMode:
                            type: string
                            enum:
                              - wallet_auth
                              - bot_only
                          privilegedSponsor:
                            properties:
                              enabled:
                                type: boolean
                              mode:
                                type: string
                                enum:
                                  - wallet_auth
                                  - bot_only
                              policy:
                                $ref: '#/components/schemas/SponsorPolicySnapshot'
                            type: object
                            required:
                              - enabled
                              - mode
                              - policy
                        type: object
                        required:
                          - listingCreateMode
                          - writeInteractionMode
                          - privilegedSponsor
                      auth:
                        properties:
                          bearerToken:
                            type: boolean
                        type: object
                        required:
                          - bearerToken
                      features:
                        properties:
                          disputeQuorum:
                            type: boolean
                          orderMailbox:
                            type: boolean
                          listingDeposit:
                            type: boolean
                          managedStorage:
                            type: boolean
                          managedStorageAnchorEnforcedOnAccept:
                            type: boolean
                          manualDispute:
                            type: boolean
                          milestoneManifestStrict:
                            type: boolean
                          milestoneSigningContextStrict:
                            type: boolean
                        type: object
                        required:
                          - disputeQuorum
                          - orderMailbox
                          - listingDeposit
                          - managedStorage
                          - managedStorageAnchorEnforcedOnAccept
                          - manualDispute
                          - milestoneManifestStrict
                          - milestoneSigningContextStrict
                    type: object
                    required:
                      - version
                      - generatedAt
                      - interaction
                      - auth
                      - features
                type: object
                required:
                  - capabilities
  /actors/me/capabilities:
    get:
      tags:
        - Auth
      operationId: getActorCapabilities
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Actor-scoped runtime capabilities.
          content:
            application/json:
              schema:
                properties:
                  actorAddress:
                    type: string
                  capabilities:
                    properties:
                      sponsor:
                        properties:
                          version:
                            type: string
                            enum:
                              - sponsor_privileges.v1
                          mode:
                            type: string
                            enum:
                              - capability
                          actorAddress:
                            type: string
                          canSponsor:
                            type: boolean
                          sponsorQuotaTier:
                            type: integer
                            minimum: 0
                            maximum: 4
                          sponsorFastLane:
                            type: boolean
                          reasonCodes:
                            type: array
                            items:
                              type: string
                          risk:
                            properties:
                              abuseLimited:
                                type: boolean
                              actorStrikes:
                                type: integer
                                minimum: 0
                              ipStrikes:
                                type: integer
                                minimum: 0
                              strikesMax:
                                type: integer
                                minimum: 1
                            type: object
                            required:
                              - abuseLimited
                              - actorStrikes
                              - ipStrikes
                              - strikesMax
                          signals:
                            properties:
                              accountType:
                                type: string
                                enum:
                                  - TRADER
                                  - CONSUMER
                              traderVerificationStatus:
                                type: string
                                enum:
                                  - NOT_SUBMITTED
                                  - PENDING
                                  - VERIFIED
                                  - REJECTED
                              tier:
                                type: integer
                                minimum: 0
                                maximum: 4
                              isBot:
                                type: boolean
                              writeInteractionMode:
                                type: string
                                enum:
                                  - wallet_auth
                                  - bot_only
                            type: object
                            required:
                              - accountType
                              - traderVerificationStatus
                              - tier
                              - isBot
                              - writeInteractionMode
                          evaluatedAt:
                            type: string
                            format: date-time
                          policy:
                            $ref: '#/components/schemas/SponsorPolicySnapshot'
                        type: object
                        required:
                          - version
                          - mode
                          - actorAddress
                          - canSponsor
                          - sponsorQuotaTier
                          - sponsorFastLane
                          - reasonCodes
                          - risk
                          - signals
                          - evaluatedAt
                          - policy
                    type: object
                    required:
                      - sponsor
                type: object
                required:
                  - actorAddress
                  - capabilities
        '401':
          description: Missing or invalid bearer token.
  /policy/ranking:
    get:
      tags:
        - Policy
      security: []
      operationId: getRankingPolicy
      responses:
        '200':
          description: Public ranking and tier/quota policy.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    $ref: '#/components/schemas/RankingPolicy'
                type: object
                required:
                  - policy
  /policy/fees:
    get:
      tags:
        - Policy
      security: []
      operationId: getFeePolicy
      responses:
        '200':
          description: Public fee policy for escrow and listings.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    $ref: '#/components/schemas/FeePolicy'
                type: object
                required:
                  - policy
  /policy/sponsor:
    get:
      tags:
        - Policy
        - Sponsor
      security: []
      operationId: getSponsorPolicy
      responses:
        '200':
          description: Canonical sponsor policy and recommended gas budget table.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    $ref: '#/components/schemas/SponsorPolicySnapshot'
                type: object
                required:
                  - policy
  /onboarding/iota-topup:
    post:
      tags:
        - Sponsor
      operationId: claimOnboardingIotaTopup
      responses:
        '200':
          description: Existing onboarding grant was already claimed for this actor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingIotaTopupResponse'
        '201':
          description: IOTA onboarding topup submitted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingIotaTopupResponse'
        '202':
          description: IOTA onboarding topup is pending confirmation after an uncertain execution outcome.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingIotaTopupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: >-
            Conflict. Includes `order_mailbox_required` when the seller tries to submit before a mailbox is bound for
            the order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Funding transaction failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Onboarding topup unavailable or misconfigured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /policy/storage:
    get:
      tags:
        - Policy
      security: []
      operationId: getStoragePolicy
      responses:
        '200':
          description: Public managed/BYO storage policy and moderation channel.
          content:
            application/json:
              schema:
                properties:
                  policy:
                    properties:
                      version:
                        type: string
                        enum:
                          - v1
                      modes:
                        properties:
                          managed:
                            properties:
                              enabled:
                                type: boolean
                              maxFileSizeBytes:
                                type: integer
                              maxFileSizeByMimeBytes:
                                type: object
                                additionalProperties:
                                  type: integer
                              signUrlExpiresSec:
                                type: integer
                              allowedMimeTypes:
                                type: array
                                items:
                                  type: string
                              blockedExtensions:
                                type: array
                                items:
                                  type: string
                              requireSha256:
                                type: boolean
                              requireConfirmedAnchorOnAccept:
                                type: boolean
                              fee:
                                properties:
                                  minAtomic:
                                    type: string
                                  asset:
                                    type: string
                                    enum:
                                      - IOTA
                                      - CLAW
                                  recipient:
                                    type: string
                                    nullable: true
                                  requiresChainEvent:
                                    type: boolean
                                type: object
                                required:
                                  - minAtomic
                                  - asset
                                  - requiresChainEvent
                            type: object
                            required:
                              - enabled
                              - maxFileSizeBytes
                              - maxFileSizeByMimeBytes
                              - signUrlExpiresSec
                              - allowedMimeTypes
                              - blockedExtensions
                              - requireSha256
                              - requireConfirmedAnchorOnAccept
                              - fee
                          byo:
                            properties:
                              enabled:
                                type: boolean
                            type: object
                            required:
                              - enabled
                        type: object
                        required:
                          - managed
                          - byo
                      moderation:
                        properties:
                          illegalContentForbidden:
                            type: boolean
                          reportEndpoint:
                            type: string
                        type: object
                        required:
                          - illegalContentForbidden
                          - reportEndpoint
                    type: object
                    required:
                      - version
                      - modes
                      - moderation
                type: object
                required:
                  - policy
  /policy/contact:
    get:
      tags:
        - Policy
      security: []
      operationId: getPublicContactPolicy
      responses:
        '200':
          description: Public compliance contact metadata and complaint intake channel.
          content:
            application/json:
              schema:
                properties:
                  contact:
                    properties:
                      name:
                        type: string
                      email:
                        type: string
                      url:
                        type: string
                    type: object
                  complaintChannel:
                    type: string
                  legalCheckpoint:
                    properties:
                      owner:
                        type: string
                      intervalDays:
                        type: integer
                      lastReviewDate:
                        type: string
                        description: ISO-8601 date (`YYYY-MM-DD`) of the last legal checkpoint.
                      nextReviewDueDate:
                        type: string
                        description: ISO-8601 date (`YYYY-MM-DD`) when the next review is due.
                      overdue:
                        type: boolean
                      daysUntilDue:
                        type: integer
                      status:
                        type: string
                        enum:
                          - scheduled
                          - missing_last_review
                    type: object
                    required:
                      - intervalDays
                      - overdue
                      - status
                  ownerRoster:
                    properties:
                      owners:
                        properties:
                          compliance:
                            type: string
                          security:
                            type: string
                          moderation:
                            type: string
                          dataProtection:
                            type: string
                        type: object
                      missingRoles:
                        type: array
                        items:
                          type: string
                          enum:
                            - compliance
                            - security
                            - moderation
                            - dataProtection
                      complete:
                        type: boolean
                    type: object
                    required:
                      - owners
                      - missingRoles
                      - complete
                type: object
                required:
                  - contact
                  - complaintChannel
                  - legalCheckpoint
                  - ownerRoster
  /rankings/listings:
    get:
      tags:
        - Policy
      security: []
      operationId: listRankedListings
      description: >-
        OFFER-only ranked listing snapshot built from a widened recent-offer candidate window. This is not the merged
        discovery feed. REQUEST listings are excluded; use `GET /listings?listingMode=ALL` for merged browse, `GET
        /listings?listingMode=REQUEST` for buyer-created requests, and `GET /listings/{listingId}` once the exact id is
        already known.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Ranked listing snapshot with score breakdown.
          content:
            application/json:
              schema:
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RankedListing'
                  policyVersion:
                    type: string
                type: object
                required:
                  - items
                  - policyVersion
  /auth/challenge:
    post:
      tags:
        - Auth
      security: []
      operationId: createAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '200':
          description: Challenge issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/verify:
    post:
      tags:
        - Auth
      security: []
      operationId: verifyAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyRequest'
      responses:
        '200':
          description: Signature accepted and session-backed bearer tokens issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      operationId: logoutAuthSession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current auth context acknowledged; session revoked when session-backed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{address}/key-agreement:
    get:
      tags:
        - Auth
      security: []
      operationId: getUserKeyAgreement
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: keyVersion
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Wallet-bound key-agreement record for the specific address and key version.
          content:
            application/json:
              schema:
                properties:
                  keyAgreement:
                    $ref: '#/components/schemas/UserKeyAgreement'
                type: object
                required:
                  - keyAgreement
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{address}/reputation:
    get:
      tags:
        - Auth
      security: []
      operationId: getUserReputation
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Objective reputation profile aggregated from order and milestone outcomes.
          content:
            application/json:
              schema:
                properties:
                  profile:
                    $ref: '#/components/schemas/UserReputationProfile'
                type: object
                required:
                  - profile
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/{address}/reviews:
    get:
      tags:
        - Auth
      security: []
      operationId: listUserReviews
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: Composite cursor `<txDigest>|<eventSeq>`.
      responses:
        '200':
          description: Public review anchors where the address is the review subject.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          description: Review feed temporarily unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Review feed not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/key-agreement:
    put:
      tags:
        - Auth
      operationId: upsertMyKeyAgreement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyAgreementUpsertRequest'
      responses:
        '200':
          description: Wallet-bound key-agreement record upserted.
          content:
            application/json:
              schema:
                properties:
                  keyAgreement:
                    $ref: '#/components/schemas/UserKeyAgreement'
                  signaturePublicKey:
                    type: string
                type: object
                required:
                  - keyAgreement
                  - signaturePublicKey
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /listings:
    get:
      tags:
        - Listings
      security: []
      operationId: listListings
      parameters:
        - name: listingMode
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ListingMode'
          description: Listing discovery defaults to `OFFER`. Set `REQUEST` explicitly to browse buyer-created requests.
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ListingCategory'
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: >-
              Sort-aware listings cursor. `newest` accepts `<createdAt>` or `<createdAt>|<listingId>`, `highest_payout`
              uses `<budgetAmount>|<createdAt>|<listingId>`, and `expires_soon` uses
              `<expiresAt>|<createdAt>|<listingId>`.
        - name: sort
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ListingSort'
      responses:
        '200':
          description: Listing collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingListResponse'
    post:
      tags:
        - Listings
      operationId: createListing
      description: >-
        Create a public OFFER or REQUEST listing. `listingMode` is required and must be sent explicitly. Live runtimes
        with on-chain reputation config may reject missing creator reputation profiles with `409
        reputation_profile_required`. `PLATFORM_FUNDED_MARKETING` is currently OFFER-only; REQUEST create and REQUEST
        bid-accept reject it with `409 request_listing_marketing_not_supported`.
      parameters:
        - name: idempotency-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListingRequest'
      responses:
        '201':
          description: Listing created.
          content:
            application/json:
              schema:
                properties:
                  item:
                    $ref: '#/components/schemas/Listing'
                  operationalWarnings:
                    type: array
                    items:
                      $ref: '#/components/schemas/OperationalWarning'
                type: object
                required:
                  - item
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /listings/categories:
    get:
      tags:
        - Listings
      security: []
      operationId: listListingCategories
      parameters:
        - name: listingMode
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ListingMode'
          description: Category counts default to `OFFER`. Set `REQUEST` explicitly to count buyer-created requests.
      responses:
        '200':
          description: Open listing categories with item counts.
          content:
            application/json:
              schema:
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ListingCategoryCount'
                type: object
                required:
                  - items
  /listings/{listingId}/bids:
    get:
      tags:
        - Listings
      operationId: listListingBids
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/BidStatus'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: Composite cursor `<createdAt>|<bidId>`.
      responses:
        '200':
          description: Listing bids visible to the listing creator or to the calling bidder for their own bids.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /listings/{listingId}/cancel:
    post:
      tags:
        - Listings
      operationId: cancelListing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: idempotency-key
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Listing canceled.
          content:
            application/json:
              schema:
                properties:
                  listing:
                    $ref: '#/components/schemas/Listing'
                type: object
                required:
                  - listing
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /listings/{listingId}/renew:
    post:
      tags:
        - Listings
      operationId: renewListing
      description: >-
        Reopen or extend a listing expiry from the creator wallet. Live runtimes with on-chain reputation config may
        reject renewals from wallets that still lack a reputation profile with `409 reputation_profile_required`.
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: idempotency-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingRenewRequest'
      responses:
        '200':
          description: Listing reopened or expiry extended.
          content:
            application/json:
              schema:
                properties:
                  listing:
                    $ref: '#/components/schemas/Listing'
                type: object
                required:
                  - listing
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
