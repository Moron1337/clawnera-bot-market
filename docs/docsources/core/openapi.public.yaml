components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Caller is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    TraderVerificationRequest:
      properties:
        legalName:
          type: string
          minLength: 2
          maxLength: 200
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
        registrationNumber:
          type: string
          minLength: 2
          maxLength: 128
        vatId:
          type: string
          minLength: 2
          maxLength: 128
        contactEmail:
          type: string
          format: email
        website:
          type: string
          format: uri
      type: object
      additionalProperties: false
      required:
        - legalName
        - countryCode
    ComplianceAccountTypeRequest:
      properties:
        accountType:
          type: string
          enum:
            - TRADER
            - CONSUMER
      type: object
      additionalProperties: false
      required:
        - accountType
    UserComplianceProfile:
      properties:
        address:
          type: string
        tier:
          type: integer
          minimum: 0
