              type: integer
            autoRevokeSec:
              type: integer
        metrics:
          type: object
          required: [reserve, execute, fallbackAdvertised]
          properties:
            reserve:
              type: object
              required: [total, success, failure, latency]
              properties:
                total:
                  type: integer
                success:
                  type: integer
                failure:
                  type: integer
                latency:
                  type: object
                  required: [count, medianMs, p95Ms]
                  properties:
                    count:
                      type: integer
                    medianMs:
                      type: integer
                    p95Ms:
                      type: integer
            execute:
              type: object
              required: [total, success, failure, latency]
              properties:
                total:
                  type: integer
                success:
                  type: integer
                failure:
                  type: integer
                latency:
                  type: object
                  required: [count, medianMs, p95Ms]
                  properties:
                    count:
                      type: integer
                    medianMs:
                      type: integer
                    p95Ms:
                      type: integer
