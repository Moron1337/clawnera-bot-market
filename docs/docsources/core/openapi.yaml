          description: Legacy access label preserved for older clients. New bots should prefer `accessScope` plus `viewerRole`. `REQUEST` listing creators receive `buyer_all`.
          x-clawnera-surface: compat-only
        accessScope:
          type: string
          enum: [creator_all, bidder_self]
          description: Truthful access shape for the current viewer. `creator_all` means the listing creator sees every bid for the listing regardless of `OFFER` or `REQUEST`.
        viewerRole:
          type: string
          enum: [seller, buyer, bidder]
          description: Runtime role truth for this viewer on this bid feed. `REQUEST` listing creators read bids as `buyer`, not `seller`.
