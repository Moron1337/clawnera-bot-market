          type: boolean
          description: True when the on-chain event scan hit its safety cap before it could prove the page is complete.
    OrderDisputeBondPolicy:
      type: string
      enum: [DUAL_BOND_REQUIRED, PLATFORM_FUNDED_MARKETING]
    OrderDisputeBondState:
      type: string
      enum: [PENDING, ACTIVE, CANCELED]
    DisputeBondSelectionMode:
      type: string
      enum: [EXPLICIT_RANGE, EXACT_MIN_PLATFORM_FUNDED]
    DisputeBondGuidance:
      type: object
      required:
        [
          policy,
          selectionMode,
          userAmountChoiceRequired,
          platformOperatorFunding,
          currentMinPerSideAmount,
          currentMaxPerSideAmount,
          defaultRequiredReviewerVotes,
          minRequiredReviewerVotes,
          maxRequiredReviewerVotes,
          selectedRequiredReviewerVotes,
          selectedRequiredReviewerVotesFloor
        ]
      properties:
        policy:
          $ref: "#/components/schemas/OrderDisputeBondPolicy"
        selectionMode:
          $ref: "#/components/schemas/DisputeBondSelectionMode"
        userAmountChoiceRequired:
          type: boolean
          description: True when the normal user path must still choose and submit an explicit amount on `/orders/{orderId}/dispute-bond/fund`.
        platformOperatorFunding:
          type: boolean
          description: True when the order uses the separate platform-funded marketing path instead of a normal user-selected amount.
        currentMinPerSideAmount:
          type: string
          nullable: true
          description: Current live minimum per-side bond amount, if the API could resolve the dispute-quorum config.
        currentMaxPerSideAmount:
          type: string
          nullable: true
          description: Current live maximum per-side bond amount for explicit-range funding, if known. Stays null on the exact-min marketing path.
        defaultRequiredReviewerVotes:
          type: integer
          nullable: true
        minRequiredReviewerVotes:
          type: integer
          nullable: true
        maxRequiredReviewerVotes:
          type: integer
          nullable: true
        selectedRequiredReviewerVotes:
          type: integer
          nullable: true
          description: Selected reviewer-vote threshold read from the bound on-chain dispute bond, if available.
        selectedRequiredReviewerVotesFloor:
          type: integer
          nullable: true
          description: Selected reviewer-vote floor read from the bound on-chain dispute bond, if available.
    Order:
      type: object
      required:
        [
          id,
          listingId,
          buyerAddress,
          sellerAddress,
          amount,
          currency,
          disputeBondPolicy,
          disputeBondState,
          status,
          createdAt,
          updatedAt
        ]
      properties:
        id:
          type: string
