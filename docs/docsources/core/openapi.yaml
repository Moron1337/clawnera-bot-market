          properties:
            windowSec:
              type: integer
            txCap:
              type: integer
            gasCap:
              type: integer
            windowStartedAtMs:
              type: integer
              format: int64
            windowEndsAtMs:
              type: integer
              format: int64
            txCount:
              type: integer
            gasTotal:
              type: integer
            blockedCount:
              type: integer
        abusePolicy:
          type: object
          required: [windowSec, strikesMax]
          properties:
            windowSec:
              type: integer
            strikesMax:
              type: integer
        capabilityPolicy:
          type: object
          required: [fastLaneMinTier, fastLaneRateLimitBps, autoRevokeSec]
