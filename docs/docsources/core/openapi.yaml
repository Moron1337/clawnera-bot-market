          type: string
          enum: [IOTA, CLAW]
        communicationAgreement:
          $ref: "#/components/schemas/OrderCommunicationAgreement"
        mailboxObjectId:
          type: string
        escrowObjectId:
          type: string
        disputeBondObjectId:
          type: string
        disputeBondPolicy:
          $ref: "#/components/schemas/OrderDisputeBondPolicy"
        disputeBondState:
          $ref: "#/components/schemas/OrderDisputeBondState"
