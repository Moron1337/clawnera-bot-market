                      from:
                        type: string
                        nullable: true
                      to:
                        type: string
                        nullable: true
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/users/{address}/tier:
    post:
      tags: [Admin, Policy]
      operationId: updateUserTier
      x-clawnera-surface: operator-internal
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTierUpdateRequest"
      responses:
        "200":
          description: Updated user tier/CLAW preference profile.
          content:
            application/json:
              schema:
                type: object
                required: [profile]
                properties:
                  profile:
                    $ref: "#/components/schemas/UserComplianceProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/sponsor/circuit:
    get:
      tags: [Admin, Sponsor]
      operationId: getSponsorCircuitStatus
      x-clawnera-surface: operator-internal
      responses:
        "200":
          description: Runtime sponsor circuit/window/abuse state snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SponsorCircuitStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/audit:
    get:
      tags: [Admin]
      operationId: listAuditEvents
      x-clawnera-surface: operator-internal
      responses:
        "200":
          description: Recent audit events.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/reviewer-selection/shortlist:
    post:
      tags: [Admin, Disputes]
      operationId: buildReviewerSelectionShortlist
      x-clawnera-surface: operator-internal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewerSelectionShortlistRequest"
      responses:
        "200":
          description: Deterministic admin/operator shortlist plus durable selection receipt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewerSelectionShortlistResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Supplied checkpoint digest does not match the latest finalized checkpoint digest fetched server-side.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Marketplace package or RPC not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/reviewer-selection-receipts/{receiptId}:
    get:
      tags: [Admin, Disputes]
      operationId: getReviewerSelectionReceipt
      x-clawnera-surface: operator-internal
      parameters:
        - name: receiptId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stored reviewer selection receipt.
          content:
            application/json:
              schema:
                type: object
                required: [receipt]
                properties:
                  receipt:
                    $ref: "#/components/schemas/ReviewerSelectionReceipt"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Caller is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ComplianceFlags:
      type: object
      required:
        [
          enableConsumers,
          enforceB2bOnly,
          enableTraderVerification,
          enableTaxCompliance,
          enableAnalytics,
          enableEmail
        ]
      properties:
        enableConsumers:
          type: boolean
        enforceB2bOnly:
          type: boolean
        enableTraderVerification:
          type: boolean
        enableTaxCompliance:
          type: boolean
        enableAnalytics:
          type: boolean
        enableEmail:
          type: boolean
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    AuthChallengeRequest:
      type: object
      additionalProperties: false
      required: [address]
      properties:
        address:
          type: string
          minLength: 1
          maxLength: 200
    AuthChallengeResponse:
      type: object
      required: [nonce, address, messageToSign, expiresAtMs]
      properties:
        nonce:
          type: string
        address:
          type: string
        messageToSign:
          type: string
        expiresAtMs:
          type: integer
          format: int64
    AuthVerifyRequest:
      type: object
      additionalProperties: false
      required: [nonce, address, signature, message]
      properties:
        nonce:
          type: string
          minLength: 1
          maxLength: 256
        address:
          type: string
          minLength: 1
          maxLength: 200
        signature:
          type: string
          minLength: 1
          maxLength: 8192
        message:
          type: string
          minLength: 1
          maxLength: 8192
    AuthRefreshRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 1
          maxLength: 8192
    AuthSessionView:
      type: object
      required: [refreshAvailable]
      properties:
        id:
          type: string
          format: uuid
        refreshAvailable:
          type: boolean
        issuedAtMs:
          type: integer
          format: int64
        refreshExpiresAtMs:
          type: integer
          format: int64
        lastRefreshedAtMs:
          type: integer
          format: int64
        revokedAtMs:
          type: integer
          format: int64
          nullable: true
    AuthVerifyResponse:
      type: object
      required: [token, refreshToken, claims, expiresAtMs, session]
      properties:
        token:
          type: string
        refreshToken:
          type: string
        claims:
          $ref: "#/components/schemas/AuthClaims"
        expiresAtMs:
          type: integer
          format: int64
        session:
          $ref: "#/components/schemas/AuthSessionView"
    AuthSessionResponse:
      type: object
      required: [actorAddress, claims, expiresAtMs, session]
      properties:
        actorAddress:
          type: string
        claims:
          $ref: "#/components/schemas/AuthClaims"
        expiresAtMs:
          type: integer
          format: int64
        session:
          $ref: "#/components/schemas/AuthSessionView"
    AuthLogoutResponse:
      type: object
      required: [ok, revoked]
      properties:
        ok:
          type: boolean
        revoked:
          type: boolean
        sessionId:
          type: string
          format: uuid
        revokedAtMs:
          type: integer
          format: int64
        reason:
          type: string
    KeyAgreementUpsertRequest:
      type: object
      additionalProperties: false
      required:
        [
          publicKeyMultibase,
          keyVersion,
          expiresAtMs,
          walletBindingMessage,
          walletBindingSignature
        ]
      properties:
        publicKeyMultibase:
          type: string
          minLength: 16
          maxLength: 256
        keyVersion:
          type: integer
          minimum: 1
        expiresAtMs:
          type: integer
          format: int64
          minimum: 1
        walletBindingMessage:
          type: string
          minLength: 16
          maxLength: 8192
        walletBindingSignature:
          type: string
          minLength: 16
          maxLength: 8192
    UserKeyAgreement:
      type: object
      required:
        [
          address,
          keyVersion,
          publicKeyMultibase,
          walletBindingMessage,
          walletBindingSignature,
          status,
          expiresAt,
          isExpired,
          createdAt,
          updatedAt
        ]
      properties:
        address:
          type: string
        keyVersion:
          type: integer
          minimum: 1
        publicKeyMultibase:
          type: string
        walletBindingMessage:
          type: string
        walletBindingSignature:
          type: string
        status:
          type: string
          enum: [ACTIVE, REVOKED]
        expiresAt:
          type: string
          format: date-time
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ReputationRoleMetrics:
      type: object
      required:
        [
          totalOrders,
          closedOrders,
          completedOrders,
          disputedOrders,
          cancelledOrders,
          settledMilestones,
          rejectedMilestones,
          refundedMilestones,
          manualReviewActions,
          autoReleaseMisses,
          sellerDeadlineMisses
        ]
      properties:
        totalOrders:
          type: integer
          minimum: 0
        closedOrders:
          type: integer
          minimum: 0
        completedOrders:
          type: integer
          minimum: 0
        disputedOrders:
          type: integer
          minimum: 0
        cancelledOrders:
          type: integer
          minimum: 0
        settledMilestones:
          type: integer
          minimum: 0
        rejectedMilestones:
          type: integer
          minimum: 0
        refundedMilestones:
          type: integer
          minimum: 0
        manualReviewActions:
          type: integer
          minimum: 0
        autoReleaseMisses:
          type: integer
          minimum: 0
        sellerDeadlineMisses:
          type: integer
          minimum: 0
    RoleReputationSummary:
      type: object
      required: [role, score, confidence, level, metrics, factors]
      properties:
        role:
          type: string
          enum: [seller, buyer]
        score:
          type: integer
          minimum: 0
          maximum: 100
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [NEW, BRONZE, SILVER, GOLD, PLATINUM]
        metrics:
          $ref: "#/components/schemas/ReputationRoleMetrics"
        factors:
          type: object
          required:
            [completionRate, disputeRate, responsivenessRate, volumeFactor, penaltyPoints]
          properties:
            completionRate:
              type: number
              minimum: 0
              maximum: 1
            disputeRate:
              type: number
              minimum: 0
              maximum: 1
            responsivenessRate:
              type: number
              minimum: 0
              maximum: 1
            volumeFactor:
              type: number
              minimum: 0
              maximum: 1
            penaltyPoints:
              type: number
              minimum: 0
    UserReputationProfile:
      type: object
      required: [address, seller, buyer, updatedAt]
      properties:
        address:
          type: string
        seller:
          $ref: "#/components/schemas/RoleReputationSummary"
        buyer:
          $ref: "#/components/schemas/RoleReputationSummary"
        updatedAt:
          type: string
          format: date-time
    CreateListingRequest:
      type: object
      additionalProperties: false
      required: [creatorAddress, title, currency, budgetAmount, milestones]
      properties:
        creatorAddress:
          type: string
        listingMode:
          $ref: "#/components/schemas/ListingMode"
          description: Send this explicitly. The legacy runtime still defaults omitted values to `OFFER`, but bot-facing helpers should always choose `OFFER` or `REQUEST` intentionally.
        title:
          type: string
          minLength: 4
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        category:
          $ref: "#/components/schemas/ListingCategory"
        promotionPolicy:
          $ref: "#/components/schemas/ListingPromotionPolicy"
          x-clawnera-surface: operator-internal
        currency:
          type: string
          enum: [IOTA, CLAW, BOTH]
        budgetAmount:
          type: string
          pattern: "^[0-9]+$"
        expiresAtMs:
          type: integer
          format: int64
          minimum: 1
          description: Optional listing expiry timestamp in milliseconds since epoch. Bot-facing helpers should send this explicitly. Omitted values still use the legacy 30-day default and may not exceed 30 days from creation.
        communicationPolicy:
          $ref: "#/components/schemas/ListingCommunicationPolicy"
        listingDepositObjectId:
          type: string
          minLength: 3
          maxLength: 200
          description: On-chain listing deposit object id for anti-spam economics.
        listingDepositTxDigest:
          type: string
          minLength: 16
          maxLength: 128
          description: Optional tx digest proving creation of listing deposit object.
        milestones:
          type: array
          minItems: 2
          maxItems: 8
          items:
            $ref: "#/components/schemas/ListingMilestone"
    ListingMilestone:
      type: object
      additionalProperties: false
      required: [title, amount]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 120
        amount:
          type: string
          pattern: "^[0-9]+$"
        dueAtMs:
          type: integer
          format: int64
          description: Structured milestone target date in milliseconds since epoch. Bot-facing helpers should provide this explicitly for every milestone so human and bot surfaces can show reliable target dates.
        reviewWindowHours:
          type: integer
          minimum: 1
          maximum: 168
        acceptanceRulesHash:
          type: string
          minLength: 8
          maxLength: 256
    ListingCategory:
      type: string
      enum: [dev, design, marketing, ops, security, other]
    ListingMode:
      type: string
      enum: [OFFER, REQUEST]
    ListingPromotionPolicy:
      type: string
      enum: [STANDARD, PLATFORM_FUNDED_MARKETING]
      description: "`PLATFORM_FUNDED_MARKETING` is currently OFFER-only in the public runtime. REQUEST listing create and REQUEST bid-accept reject it with `409 request_listing_marketing_not_supported`."
    ListingSort:
      type: string
      enum: [newest, highest_payout, expires_soon]
    ListingCategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          $ref: "#/components/schemas/ListingCategory"
        count:
          type: integer
          minimum: 0
    ListingCommunicationPolicy:
      type: object
      additionalProperties: false
      required: [version, transportOptions, relayUrls]
      properties:
        version:
          type: string
          enum: [v1]
        transportOptions:
          type: array
          minItems: 1
          maxItems: 4
          items:
            type: string
            enum: [nostr]
        relayUrls:
          type: array
          minItems: 1
          maxItems: 8
          items:
            type: string
            pattern: "^wss://"
            minLength: 8
            maxLength: 256
        requireAck:
          type: boolean
        responseWindowSec:
          type: integer
          minimum: 30
          maximum: 604800
        messageTtlSec:
          type: integer
          minimum: 60
          maximum: 604800
    OrderCommunicationParticipantProposal:
      type: object
      additionalProperties: false
      required: [keyVersion, publicKeyMultibase, walletBindingMessage, walletBindingSignature]
      properties:
        keyVersion:
          type: integer
          minimum: 1
        publicKeyMultibase:
          type: string
          minLength: 16
          maxLength: 256
        walletBindingMessage:
          type: string
          minLength: 24
          maxLength: 8192
        walletBindingSignature:
          type: string
          minLength: 16
          maxLength: 8192
    OrderCommunicationProposalRequest:
      type: object
      additionalProperties: false
      required: [version, transport, relayUrls, buyer, seller]
      properties:
        version:
          type: string
          enum: [v1]
        transport:
          type: string
          enum: [nostr]
        relayUrls:
          type: array
          minItems: 1
          maxItems: 8
          items:
            type: string
            pattern: "^wss://"
            minLength: 8
            maxLength: 256
        buyer:
          $ref: "#/components/schemas/OrderCommunicationParticipantProposal"
        seller:
          $ref: "#/components/schemas/OrderCommunicationParticipantProposal"
    OrderCommunicationParticipant:
      type: object
      required:
        [
          address,
          keyVersion,
          publicKeyMultibase,
          walletBindingMessage,
          walletBindingSignature,
          issuedAtMs,
          expiresAtMs,
          nonce,
          signerPublicKey
        ]
      properties:
        address:
          type: string
        keyVersion:
          type: integer
          minimum: 1
        publicKeyMultibase:
          type: string
        walletBindingMessage:
          type: string
        walletBindingSignature:
          type: string
        issuedAtMs:
          type: integer
          format: int64
        expiresAtMs:
          type: integer
          format: int64
        nonce:
          type: string
        signerPublicKey:
          type: string
    OrderCommunicationAgreement:
      type: object
      required:
        [version, status, orderId, transport, relayUrls, buyer, seller, negotiatedAt, policySnapshot]
      properties:
        version:
          type: string
          enum: [v1]
        status:
          type: string
          enum: [ACTIVE]
        orderId:
          type: string
          format: uuid
        transport:
          type: string
          enum: [nostr]
        relayUrls:
          type: array
          items:
            type: string
        buyer:
          $ref: "#/components/schemas/OrderCommunicationParticipant"
        seller:
          $ref: "#/components/schemas/OrderCommunicationParticipant"
        negotiatedAt:
          type: string
          format: date-time
        policySnapshot:
          $ref: "#/components/schemas/ListingCommunicationPolicy"
    CreateBidRequest:
      type: object
      additionalProperties: false
      required: [listingId, bidderAddress, amount, currency]
      properties:
        listingId:
          type: string
          format: uuid
        bidderAddress:
          type: string
        amount:
          type: string
          pattern: "^[0-9]+$"
        currency:
          type: string
          enum: [IOTA, CLAW]
        message:
          type: string
          minLength: 1
          maxLength: 1000
    ListingRenewRequest:
      type: object
      additionalProperties: false
      required: [expiresAtMs]
      properties:
        expiresAtMs:
          type: integer
          format: int64
          minimum: 1
    AcceptBidByListingRequest:
      type: object
      additionalProperties: false
      required: [buyerAddress, sellerAddress, amount, currency]
      properties:
        buyerAddress:
          type: string
        sellerAddress:
          type: string
        amount:
          type: string
          pattern: "^[0-9]+$"
        currency:
          type: string
          enum: [IOTA, CLAW]
        orderId:
          type: string
          format: uuid
        communicationProposal:
          $ref: "#/components/schemas/OrderCommunicationProposalRequest"
    AcceptStoredBidRequest:
      type: object
      additionalProperties: false
      properties:
        buyerAddress:
          type: string
        sellerAddress:
          type: string
        amount:
          type: string
          pattern: "^[0-9]+$"
        currency:
          type: string
          enum: [IOTA, CLAW]
        orderId:
          type: string
          format: uuid
        communicationProposal:
          $ref: "#/components/schemas/OrderCommunicationProposalRequest"
    AcceptBidRequest:
      oneOf:
        - $ref: "#/components/schemas/AcceptBidByListingRequest"
        - $ref: "#/components/schemas/AcceptStoredBidRequest"
    SponsorTxFamily:
      type: string
      enum:
        [
          marketplace_write,
          mailbox_signal,
          milestone_submit,
          review_post,
          deadline_extension,
          mutual_cancel,
          dispute_bond,
          dispute_vote,
          dispute_resolution,
          claw_payment
        ]
    SponsorGasEstimate:
      type: object
      additionalProperties: false
      required: [txFamily, purpose, minimumGasBudget, recommendedGasBudget, maxGasBudget, rationale]
      properties:
        txFamily:
          $ref: "#/components/schemas/SponsorTxFamily"
        purpose:
          type: string
        minimumGasBudget:
          type: integer
          minimum: 1
        recommendedGasBudget:
          type: integer
          minimum: 1
        maxGasBudget:
          type: integer
          minimum: 1
        rationale:
          type: string
    SponsorPolicySnapshot:
      type: object
      additionalProperties: false
      required:
        [
          version,
          allowedPurposes,
          allowedPaymentCoins,
          paymentCoinOptional,
          selfPayFallback,
          orderIdMode,
          reservationTtlSec,
          liveMinimumGasBudget,
          maxGasBudget,
          reserve,
          execute,
          platformFundedMarketing,
          onboardingIotaTopup,
          recommendedGasBudgets
        ]
      properties:
        version:
          type: string
          enum: [sponsor_policy.v2]
        allowedPurposes:
          type: array
          items:
            type: string
        allowedPaymentCoins:
          type: array
          items:
            type: string
        paymentCoinOptional:
          type: boolean
        selfPayFallback:
          type: boolean
        orderIdMode:
          type: string
          enum: [optional, required]
        reservationTtlSec:
          type: integer
          minimum: 1
        liveMinimumGasBudget:
          type: integer
          minimum: 1
        maxGasBudget:
          type: integer
          minimum: 1
        reserve:
          type: object
          additionalProperties: false
          required: [orderIdRequired, rateLimitPerMin, windowSec, windowTxCap, windowGasCap]
          properties:
            orderIdRequired:
              type: boolean
            rateLimitPerMin:
              type: integer
              minimum: 1
            windowSec:
              type: integer
              minimum: 1
            windowTxCap:
              type: integer
              minimum: 1
            windowGasCap:
              type: integer
              minimum: 1
        execute:
          type: object
          additionalProperties: false
          required:
            [idempotencyHeader, intentSupported, intentRequiredForPlatformFundedMarketing, intentSignatureRequiredForPlatformFundedMarketing]
          properties:
            idempotencyHeader:
              type: string
              enum: [idempotency-key]
            intentSupported:
              type: boolean
            intentRequiredForPlatformFundedMarketing:
              type: boolean
            intentSignatureRequiredForPlatformFundedMarketing:
              type: boolean
        platformFundedMarketing:
          type: object
          additionalProperties: false
          required:
            [sponsorPreferred, sponsorRequired, selfPayFallback, intentRequired, intentSignatureRequired]
          properties:
            sponsorPreferred:
              type: boolean
            sponsorRequired:
              type: boolean
            selfPayFallback:
              type: boolean
            intentRequired:
              type: boolean
            intentSignatureRequired:
              type: boolean
        onboardingIotaTopup:
          type: object
          additionalProperties: false
          required: [enabled, amount, maxEligibleBalance]
          properties:
            enabled:
              type: boolean
            amount:
              type: string
              pattern: "^[0-9]+$"
            maxEligibleBalance:
              type: string
              pattern: "^[0-9]+$"
        recommendedGasBudgets:
          type: object
          additionalProperties: false
          required:
            [
              marketplace_write,
              mailbox_signal,
              milestone_submit,
              review_post,
              deadline_extension,
              mutual_cancel,
              dispute_bond,
              dispute_vote,
              dispute_resolution,
              claw_payment
            ]
          properties:
            marketplace_write:
              $ref: "#/components/schemas/SponsorGasEstimate"
            mailbox_signal:
              $ref: "#/components/schemas/SponsorGasEstimate"
            milestone_submit:
              $ref: "#/components/schemas/SponsorGasEstimate"
            review_post:
              $ref: "#/components/schemas/SponsorGasEstimate"
            deadline_extension:
              $ref: "#/components/schemas/SponsorGasEstimate"
            mutual_cancel:
              $ref: "#/components/schemas/SponsorGasEstimate"
            dispute_bond:
              $ref: "#/components/schemas/SponsorGasEstimate"
            dispute_vote:
              $ref: "#/components/schemas/SponsorGasEstimate"
            dispute_resolution:
              $ref: "#/components/schemas/SponsorGasEstimate"
            claw_payment:
              $ref: "#/components/schemas/SponsorGasEstimate"
    OnboardingIotaTopupResponse:
      type: object
      additionalProperties: false
      required: [funded, amount, senderAddress, maxEligibleBalance]
      properties:
        funded:
          type: boolean
        alreadyClaimed:
          type: boolean
        pendingConfirmation:
          type: boolean
        amount:
          type: string
          pattern: "^[0-9]+$"
        txDigest:
          type: string
        senderAddress:
          type: string
        completedAt:
          type: string
          format: date-time
        balanceBefore:
