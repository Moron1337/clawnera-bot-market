              currency,
              model,
              amount,
              referenceExecuteGas,
              multiplierBps,
              minAmount,
              maxAmount,
              updateCadenceSec,
              requiredCreatePath
            ]
          properties:
            currency:
              type: string
              enum: [IOTA]
            model:
              type: string
              enum: [reference_execute_gas]
            amount:
              type: string
              pattern: "^[0-9]+$"
            referenceExecuteGas:
              type: integer
              minimum: 1
            multiplierBps:
              type: integer
              minimum: 1
              maximum: 10000
            minAmount:
              type: string
              pattern: "^[0-9]+$"
            maxAmount:
