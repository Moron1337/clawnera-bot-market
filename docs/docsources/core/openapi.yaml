          type: string
          enum: [AWAITING_DEPOSITS, IN_PROGRESS, DISPUTED, COMPLETED, CANCELLED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrderListResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        nextCursor:
          type: string
          nullable: true
    AcceptBidResponse:
      type: object
      required: [order, disputeBondRequired, disputeBondState, disputeBondPolicy, disputeBondGuidance]
      properties:
        order:
          $ref: "#/components/schemas/Order"
        disputeBondRequired:
          type: boolean
          description: True for normal dual-bond orders that still need buyer and seller bond principal funding before execution can start.
        disputeBondState:
          allOf:
            - $ref: "#/components/schemas/OrderDisputeBondState"
          description: Current dispute-bond lifecycle state. Accept-time readback does not itself initialize or fund the bond.
        disputeBondPolicy:
          allOf:
            - $ref: "#/components/schemas/OrderDisputeBondPolicy"
          description: Funding policy selected for the order. This tells clients whether the later funding step is explicit-range or exact-min platform-funded; it does not select the final amount by itself.
        disputeBondGuidance:
          $ref: "#/components/schemas/DisputeBondGuidance"
        operationalWarnings:
          type: array
          description: May include warning codes such as `order_requires_dual_bond_funding`, `dispute_bond_amount_explicit_choice_required`, `platform_funded_marketing_operator_handoff_required`, and `platform_marketing_dispute_bond_exact_min`.
          items:
            $ref: "#/components/schemas/OperationalWarning"
    OrderReadResponse:
      type: object
      required: [order, disputeBondGuidance]
      properties:
        order:
          $ref: "#/components/schemas/Order"
        disputeBondGuidance:
          $ref: "#/components/schemas/DisputeBondGuidance"
