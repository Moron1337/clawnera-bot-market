components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Caller is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ComplianceFlags:
      type: object
      required:
        [
          enableConsumers,
          enforceB2bOnly,
          enableTraderVerification,
          enableTaxCompliance,
          enableAnalytics,
          enableEmail
        ]
      properties:
        enableConsumers:
          type: boolean
        enforceB2bOnly:
          type: boolean
        enableTraderVerification:
          type: boolean
        enableTaxCompliance:
          type: boolean
        enableAnalytics:
          type: boolean
        enableEmail:
          type: boolean
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    AuthChallengeRequest:
      type: object
      additionalProperties: false
      required: [address]
      properties:
        address:
          type: string
          minLength: 1
          maxLength: 200
    AuthChallengeResponse:
      type: object
      required: [nonce, address, messageToSign, expiresAtMs]
      properties:
        nonce:
          type: string
        address:
          type: string
        messageToSign:
          type: string
        expiresAtMs:
          type: integer
          format: int64
    AuthVerifyRequest:
      type: object
      additionalProperties: false
      required: [nonce, address, signature, message]
      properties:
        nonce:
          type: string
          minLength: 1
          maxLength: 256
        address:
          type: string
          minLength: 1
          maxLength: 200
        signature:
          type: string
          minLength: 1
          maxLength: 8192
        message:
          type: string
          minLength: 1
          maxLength: 8192
    KeyAgreementUpsertRequest:
      type: object
      additionalProperties: false
      required:
        [
          publicKeyMultibase,
          keyVersion,
          expiresAtMs,
          walletBindingMessage,
          walletBindingSignature
        ]
      properties:
        publicKeyMultibase:
          type: string
          minLength: 16
          maxLength: 256
        keyVersion:
          type: integer
          minimum: 1
        expiresAtMs:
          type: integer
          format: int64
          minimum: 1
        walletBindingMessage:
          type: string
          minLength: 16
          maxLength: 8192
        walletBindingSignature:
          type: string
          minLength: 16
          maxLength: 8192
    UserKeyAgreement:
      type: object
      required:
        [
          address,
          keyVersion,
          publicKeyMultibase,
          walletBindingMessage,
          walletBindingSignature,
          status,
          expiresAt,
          isExpired,
          createdAt,
          updatedAt
        ]
      properties:
        address:
          type: string
        keyVersion:
          type: integer
          minimum: 1
        publicKeyMultibase:
          type: string
        walletBindingMessage:
          type: string
        walletBindingSignature:
          type: string
        status:
          type: string
          enum: [ACTIVE, REVOKED]
        expiresAt:
          type: string
          format: date-time
        isExpired:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ReputationRoleMetrics:
      type: object
      required:
        [
          totalOrders,
          closedOrders,
          completedOrders,
          disputedOrders,
          cancelledOrders,
          settledMilestones,
          rejectedMilestones,
          refundedMilestones,
          manualReviewActions,
          autoReleaseMisses,
          sellerDeadlineMisses
        ]
      properties:
        totalOrders:
          type: integer
          minimum: 0
        closedOrders:
          type: integer
          minimum: 0
        completedOrders:
          type: integer
          minimum: 0
        disputedOrders:
          type: integer
          minimum: 0
        cancelledOrders:
          type: integer
          minimum: 0
        settledMilestones:
          type: integer
          minimum: 0
        rejectedMilestones:
          type: integer
          minimum: 0
        refundedMilestones:
          type: integer
          minimum: 0
        manualReviewActions:
          type: integer
          minimum: 0
        autoReleaseMisses:
          type: integer
          minimum: 0
        sellerDeadlineMisses:
          type: integer
          minimum: 0
    RoleReputationSummary:
      type: object
      required: [role, score, confidence, level, metrics, factors]
      properties:
        role:
          type: string
          enum: [seller, buyer]
        score:
          type: integer
          minimum: 0
          maximum: 100
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [NEW, BRONZE, SILVER, GOLD, PLATINUM]
        metrics:
          $ref: "#/components/schemas/ReputationRoleMetrics"
        factors:
          type: object
          required:
            [completionRate, disputeRate, responsivenessRate, volumeFactor, penaltyPoints]
          properties:
            completionRate:
              type: number
              minimum: 0
              maximum: 1
            disputeRate:
              type: number
              minimum: 0
              maximum: 1
            responsivenessRate:
              type: number
              minimum: 0
              maximum: 1
            volumeFactor:
              type: number
              minimum: 0
              maximum: 1
            penaltyPoints:
              type: number
              minimum: 0
    UserReputationProfile:
      type: object
      required: [address, seller, buyer, updatedAt]
      properties:
        address:
          type: string
        seller:
          $ref: "#/components/schemas/RoleReputationSummary"
        buyer:
          $ref: "#/components/schemas/RoleReputationSummary"
        updatedAt:
          type: string
          format: date-time
    CreateListingRequest:
      type: object
      additionalProperties: false
      required: [creatorAddress, title, currency, budgetAmount, milestones]
      properties:
        creatorAddress:
          type: string
        title:
          type: string
          minLength: 4
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        category:
          $ref: "#/components/schemas/ListingCategory"
        currency:
          type: string
          enum: [IOTA, CLAW, BOTH]
        budgetAmount:
          type: string
          pattern: "^[0-9]+$"
        communicationPolicy:
          $ref: "#/components/schemas/ListingCommunicationPolicy"
        listingDepositObjectId:
          type: string
          minLength: 3
          maxLength: 200
          description: On-chain listing deposit object id for anti-spam economics.
        listingDepositTxDigest:
          type: string
          minLength: 16
          maxLength: 128
          description: Optional tx digest proving creation of listing deposit object.
        milestones:
          type: array
          minItems: 2
          maxItems: 8
          items:
            $ref: "#/components/schemas/ListingMilestone"
    ListingMilestone:
      type: object
      additionalProperties: false
      required: [title, amount]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 120
        amount:
          type: string
          pattern: "^[0-9]+$"
        dueAtMs:
          type: integer
          format: int64
        reviewWindowHours:
          type: integer
          minimum: 1
          maximum: 168
        acceptanceRulesHash:
          type: string
          minLength: 8
          maxLength: 256
    ListingCategory:
      type: string
      enum: [dev, design, marketing, ops, security, other]
    ListingCategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          $ref: "#/components/schemas/ListingCategory"
        count:
          type: integer
          minimum: 0
    ListingCommunicationPolicy:
      type: object
      additionalProperties: false
      required: [version, transportOptions, relayUrls]
      properties:
        version:
          type: string
          enum: [v1]
        transportOptions:
          type: array
          minItems: 1
          maxItems: 4
          items:
            type: string
            enum: [nostr]
        relayUrls:
          type: array
          minItems: 1
          maxItems: 8
          items:
            type: string
            pattern: "^wss://"
            minLength: 8
            maxLength: 256
        requireAck:
          type: boolean
        responseWindowSec:
          type: integer
          minimum: 30
          maximum: 604800
        messageTtlSec:
          type: integer
          minimum: 60
          maximum: 604800
    OrderCommunicationParticipantProposal:
      type: object
      additionalProperties: false
      required: [keyVersion, publicKeyMultibase, walletBindingMessage, walletBindingSignature]
      properties:
        keyVersion:
          type: integer
          minimum: 1
        publicKeyMultibase:
          type: string
          minLength: 16
          maxLength: 256
        walletBindingMessage:
          type: string
          minLength: 24
          maxLength: 8192
        walletBindingSignature:
          type: string
          minLength: 16
          maxLength: 8192
    OrderCommunicationProposalRequest:
      type: object
      additionalProperties: false
      required: [version, transport, relayUrls, buyer, seller]
      properties:
        version:
          type: string
          enum: [v1]
        transport:
          type: string
          enum: [nostr]
        relayUrls:
          type: array
          minItems: 1
          maxItems: 8
          items:
            type: string
            pattern: "^wss://"
            minLength: 8
            maxLength: 256
        buyer:
          $ref: "#/components/schemas/OrderCommunicationParticipantProposal"
        seller:
          $ref: "#/components/schemas/OrderCommunicationParticipantProposal"
    OrderCommunicationParticipant:
      type: object
      required:
        [
          address,
          keyVersion,
          publicKeyMultibase,
          walletBindingMessage,
          walletBindingSignature,
          issuedAtMs,
          expiresAtMs,
          nonce,
          signerPublicKey
        ]
      properties:
        address:
          type: string
        keyVersion:
          type: integer
          minimum: 1
        publicKeyMultibase:
          type: string
        walletBindingMessage:
          type: string
        walletBindingSignature:
          type: string
        issuedAtMs:
          type: integer
          format: int64
        expiresAtMs:
          type: integer
          format: int64
        nonce:
          type: string
        signerPublicKey:
          type: string
    OrderCommunicationAgreement:
      type: object
      required:
        [version, status, orderId, transport, relayUrls, buyer, seller, negotiatedAt, policySnapshot]
      properties:
        version:
          type: string
          enum: [v1]
        status:
          type: string
          enum: [ACTIVE]
        orderId:
          type: string
          format: uuid
        transport:
          type: string
          enum: [nostr]
        relayUrls:
          type: array
          items:
            type: string
        buyer:
          $ref: "#/components/schemas/OrderCommunicationParticipant"
        seller:
          $ref: "#/components/schemas/OrderCommunicationParticipant"
        negotiatedAt:
          type: string
          format: date-time
        policySnapshot:
          $ref: "#/components/schemas/ListingCommunicationPolicy"
    AcceptBidRequest:
      type: object
      additionalProperties: false
      required: [buyerAddress, sellerAddress, amount, currency]
      properties:
        buyerAddress:
          type: string
        sellerAddress:
          type: string
        amount:
          type: string
          pattern: "^[0-9]+$"
        currency:
          type: string
          enum: [IOTA, CLAW]
        orderId:
          type: string
          format: uuid
        communicationProposal:
          $ref: "#/components/schemas/OrderCommunicationProposalRequest"
