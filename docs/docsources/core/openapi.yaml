openapi: 3.0.3
info:
  title: CLAWDEX API
  version: 0.1.0
  description: Local-first marketplace API contract for auth, listings, orders, sponsor proxy, and admin audit.
servers:
  - url: https://clawdex-api.specdrops.workers.dev
  - url: https://api.local
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Listings
  - name: Orders
  - name: Disputes
  - name: Sponsor
  - name: Compliance
  - name: Policy
  - name: Admin
paths:
  /health:
    get:
      tags: [Health]
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Worker health information.
          content:
            application/json:
              schema:
                type: object
                required: [status, appEnv, sponsorMode, compliance]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  appEnv:
                    type: string
                  sponsorMode:
                    type: string
                    enum: [mock, live]
                  compliance:
                    $ref: "#/components/schemas/ComplianceFlags"
  /ready:
    get:
      tags: [Health]
      security: []
      operationId: getReady
      responses:
        "200":
          description: Worker readiness information.
          content:
            application/json:
              schema:
                type: object
                required: [status, sponsorLiveConfigured]
                properties:
                  status:
                    type: string
                    enum: [ready]
                  sponsorLiveConfigured:
                    type: boolean
  /capabilities:
    get:
      tags: [Policy]
      security: []
      operationId: getCapabilities
      responses:
        "200":
          description: Machine-readable runtime capabilities for bot clients.
          content:
            application/json:
              schema:
                type: object
                required: [capabilities]
                properties:
                  capabilities:
                    type: object
                    required: [version, generatedAt, interaction, auth, features]
                    properties:
                      version:
                        type: string
                      generatedAt:
                        type: string
                        format: date-time
                      interaction:
                        type: object
                        required:
                          [listingCreateMode, writeInteractionMode, requiresBotKey, requiresBotProfile, privilegedSponsor]
                        properties:
                          listingCreateMode:
                            type: string
                            enum: [wallet_auth, bot_only]
                          writeInteractionMode:
                            type: string
                            enum: [wallet_auth, bot_only]
                          requiresBotKey:
                            type: boolean
                          requiresBotProfile:
                            type: boolean
                          privilegedSponsor:
                            type: object
                            required: [enabled, mode, enforcement, requiresBotKey, requiresBotProfile]
                            properties:
                              enabled:
                                type: boolean
                              mode:
                                type: string
                                enum: [wallet_auth, bot_only]
                              enforcement:
                                type: string
                                enum: [legacy_bot, hybrid, capability]
                              requiresBotKey:
                                type: boolean
                              requiresBotProfile:
                                type: boolean
                      auth:
                        type: object
                        required: [bearerToken, botHeader]
                        properties:
                          bearerToken:
                            type: boolean
                          botHeader:
                            type: string
                            nullable: true
                      features:
                        type: object
                        required:
                          [
                            disputeQuorum,
                            orderMailbox,
                            listingDeposit,
                            managedStorage,
                            managedStorageAnchorEnforcedOnAccept,
                            manualDispute,
                            milestoneManifestStrict,
                            milestoneSigningContextStrict
                          ]
                        properties:
                          disputeQuorum:
                            type: boolean
                          orderMailbox:
                            type: boolean
                          listingDeposit:
                            type: boolean
                          managedStorage:
                            type: boolean
                          managedStorageAnchorEnforcedOnAccept:
                            type: boolean
                          manualDispute:
                            type: boolean
                          milestoneManifestStrict:
                            type: boolean
                          milestoneSigningContextStrict:
                            type: boolean
  /actors/me/capabilities:
    get:
      tags: [Auth]
      operationId: getActorCapabilities
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Actor-scoped runtime capabilities.
          content:
            application/json:
              schema:
                type: object
                required: [actorAddress, capabilities]
                properties:
                  actorAddress:
                    type: string
                  capabilities:
                    type: object
                    required: [sponsor]
                    properties:
                      sponsor:
                        type: object
                        required:
                          [version, mode, actorAddress, canSponsor, sponsorQuotaTier, sponsorFastLane, reasonCodes, risk, signals, evaluatedAt]
                        properties:
                          version:
                            type: string
                            enum: [sponsor_privileges.v1]
                          mode:
                            type: string
                            enum: [legacy_bot, hybrid, capability]
                          actorAddress:
                            type: string
                          canSponsor:
                            type: boolean
                          sponsorQuotaTier:
                            type: integer
                            minimum: 0
                            maximum: 4
                          sponsorFastLane:
                            type: boolean
                          reasonCodes:
                            type: array
                            items:
                              type: string
                          risk:
                            type: object
                            required: [abuseLimited, actorStrikes, ipStrikes, strikesMax]
                            properties:
                              abuseLimited:
                                type: boolean
                              actorStrikes:
                                type: integer
                                minimum: 0
                              ipStrikes:
                                type: integer
                                minimum: 0
                              strikesMax:
                                type: integer
                                minimum: 1
                          signals:
                            type: object
                            required: [accountType, traderVerificationStatus, tier, isBot, writeInteractionMode]
                            properties:
                              accountType:
                                type: string
                                enum: [TRADER, CONSUMER]
                              traderVerificationStatus:
                                type: string
                                enum: [NOT_SUBMITTED, PENDING, VERIFIED, REJECTED]
                              tier:
                                type: integer
                                minimum: 0
                                maximum: 4
                              isBot:
                                type: boolean
                              writeInteractionMode:
                                type: string
                                enum: [wallet_auth, bot_only]
                          evaluatedAt:
                            type: string
                            format: date-time
        "401":
          description: Missing or invalid bearer token.
  /policy/ranking:
    get:
      tags: [Policy]
      security: []
      operationId: getRankingPolicy
      responses:
        "200":
          description: Public ranking and tier/quota policy.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/RankingPolicy"
  /policy/fees:
    get:
      tags: [Policy]
      security: []
      operationId: getFeePolicy
      responses:
        "200":
          description: Public fee policy for escrow and listings.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/FeePolicy"
  /policy/storage:
    get:
      tags: [Policy]
      security: []
      operationId: getStoragePolicy
      responses:
        "200":
          description: Public managed/BYO storage policy and moderation channel.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    type: object
                    required: [version, modes, moderation]
                    properties:
                      version:
                        type: string
                        enum: [v1]
                      modes:
                        type: object
                        required: [managed, byo]
                        properties:
                          managed:
                            type: object
                            required:
                              [
                                enabled,
                                maxFileSizeBytes,
                                maxFileSizeByMimeBytes,
                                signUrlExpiresSec,
                                allowedMimeTypes,
                                blockedExtensions,
                                requireSha256,
                                requireConfirmedAnchorOnAccept,
                                fee
                              ]
                            properties:
                              enabled:
                                type: boolean
                              maxFileSizeBytes:
                                type: integer
                              maxFileSizeByMimeBytes:
                                type: object
                                additionalProperties:
                                  type: integer
                              signUrlExpiresSec:
                                type: integer
                              allowedMimeTypes:
                                type: array
                                items:
                                  type: string
                              blockedExtensions:
                                type: array
                                items:
                                  type: string
                              requireSha256:
                                type: boolean
                              requireConfirmedAnchorOnAccept:
                                type: boolean
                              fee:
                                type: object
                                required: [minAtomic, asset, requiresChainEvent]
                                properties:
                                  minAtomic:
                                    type: string
                                  asset:
                                    type: string
                                    enum: [IOTA, CLAW]
                                  recipient:
                                    type: string
                                    nullable: true
                                  requiresChainEvent:
                                    type: boolean
                          byo:
                            type: object
                            required: [enabled]
                            properties:
                              enabled:
                                type: boolean
                      moderation:
                        type: object
                        required: [illegalContentForbidden, reportEndpoint]
                        properties:
                          illegalContentForbidden:
                            type: boolean
                          reportEndpoint:
                            type: string
  /policy/contact:
    get:
      tags: [Policy]
      security: []
      operationId: getPublicContactPolicy
      responses:
        "200":
          description: Public compliance contact metadata and complaint intake channel.
          content:
            application/json:
              schema:
                type: object
                required: [contact, complaintChannel, legalCheckpoint, ownerRoster]
                properties:
                  contact:
                    type: object
                    properties:
                      name:
                        type: string
                      email:
                        type: string
                      url:
                        type: string
                  complaintChannel:
                    type: string
                  legalCheckpoint:
                    type: object
                    required: [intervalDays, overdue, status]
                    properties:
                      owner:
                        type: string
                      intervalDays:
                        type: integer
                      lastReviewDate:
                        type: string
                        description: ISO-8601 date (`YYYY-MM-DD`) of the last legal checkpoint.
                      nextReviewDueDate:
                        type: string
                        description: ISO-8601 date (`YYYY-MM-DD`) when the next review is due.
                      overdue:
                        type: boolean
                      daysUntilDue:
                        type: integer
                      status:
                        type: string
                        enum: [scheduled, missing_last_review]
                  ownerRoster:
                    type: object
                    required: [owners, missingRoles, complete]
                    properties:
                      owners:
                        type: object
                        properties:
                          compliance:
                            type: string
                          security:
                            type: string
                          moderation:
                            type: string
                          dataProtection:
                            type: string
                      missingRoles:
                        type: array
                        items:
                          type: string
                          enum: [compliance, security, moderation, dataProtection]
                      complete:
                        type: boolean
  /rankings/listings:
    get:
      tags: [Policy]
      security: []
      operationId: listRankedListings
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Ranked listing snapshot with score breakdown.
          content:
            application/json:
              schema:
                type: object
                required: [items, policyVersion]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RankedListing"
                  policyVersion:
                    type: string
  /auth/challenge:
    post:
      tags: [Auth]
      security: []
      operationId: createAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthChallengeRequest"
      responses:
        "200":
          description: Challenge issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/verify:
    post:
      tags: [Auth]
      security: []
      operationId: verifyAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyRequest"
      responses:
        "200":
          description: Signature accepted and bearer token issued.
          content:
            application/json:
              schema:
                type: object
                required: [token, claims, expiresAtMs]
                properties:
                  token:
                    type: string
                  claims:
                    $ref: "#/components/schemas/AuthClaims"
                  expiresAtMs:
                    type: integer
                    format: int64
        "401":
          $ref: "#/components/responses/Unauthorized"
  /users/{address}/key-agreement:
    get:
      tags: [Auth]
      security: []
      operationId: getUserKeyAgreement
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: keyVersion
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Latest (or specific) wallet-bound key-agreement record for the address.
          content:
            application/json:
              schema:
                type: object
                required: [keyAgreement]
                properties:
                  keyAgreement:
                    $ref: "#/components/schemas/UserKeyAgreement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /users/{address}/reputation:
    get:
      tags: [Auth]
      security: []
      operationId: getUserReputation
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Objective reputation profile aggregated from order and milestone outcomes.
          content:
            application/json:
              schema:
                type: object
                required: [profile]
                properties:
                  profile:
                    $ref: "#/components/schemas/UserReputationProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
  /users/me/key-agreement:
    put:
      tags: [Auth]
      operationId: upsertMyKeyAgreement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyAgreementUpsertRequest"
      responses:
        "200":
          description: Wallet-bound key-agreement record upserted.
          content:
            application/json:
              schema:
                type: object
                required: [keyAgreement, signaturePublicKey]
                properties:
                  keyAgreement:
                    $ref: "#/components/schemas/UserKeyAgreement"
                  signaturePublicKey:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /storage/uploads/presign:
    post:
      tags: [Orders]
      operationId: presignManagedStorageUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManagedStoragePresignRequest"
      responses:
        "200":
          description: Upload policy + signed URL for managed mode, or BYO guidance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedStoragePresignResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          description: File exceeds policy limits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Managed storage provider request failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /listings:
    get:
      tags: [Listings]
      security: []
      operationId: listListings
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListingCategory"
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Listing collection.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Listing"
                  nextCursor:
                    type: string
                    format: date-time
                    nullable: true
    post:
      tags: [Listings]
      operationId: createListing
      parameters:
        - name: idempotency-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingRequest"
      responses:
        "201":
          description: Listing created.
          content:
            application/json:
              schema:
                type: object
                required: [item]
                properties:
                  item:
                    $ref: "#/components/schemas/Listing"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /listings/categories:
    get:
      tags: [Listings]
      security: []
      operationId: listListingCategories
      responses:
        "200":
          description: Open listing categories with item counts.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ListingCategoryCount"
  /bids/{listingId}/accept:
    post:
      tags: [Orders]
      operationId: acceptBid
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: idempotency-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptBidRequest"
      responses:
        "201":
          description: Order created from accepted bid.
          content:
            application/json:
              schema:
                type: object
                required: [order, disputeBondRequired, disputeBondState, disputeBondPolicy]
                properties:
                  order:
                    $ref: "#/components/schemas/Order"
                  disputeBondRequired:
                    type: boolean
                  disputeBondState:
                    $ref: "#/components/schemas/OrderDisputeBondState"
                  disputeBondPolicy:
                    $ref: "#/components/schemas/OrderDisputeBondPolicy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order by id.
          content:
            application/json:
              schema:
                type: object
                required: [order]
                properties:
                  order:
                    $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /orders/{orderId}/mailbox:
    get:
      tags: [Orders]
      operationId: getOrderMailbox
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bound on-chain mailbox object id for this order.
          content:
            application/json:
              schema:
                type: object
                required: [mailboxObjectId]
                properties:
                  mailboxObjectId:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Orders]
      operationId: setOrderMailbox
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderMailboxUpsertRequest"
      responses:
        "200":
          description: Mailbox object id verified and attached to order.
          content:
            application/json:
              schema:
                type: object
                required: [order, mailboxObjectId]
                properties:
                  order:
                    $ref: "#/components/schemas/Order"
                  mailboxObjectId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          description: On-chain mailbox verification temporarily unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /orders/{orderId}/communication-agreement:
    get:
      tags: [Orders]
      operationId: getOrderCommunicationAgreement
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Negotiated bot communication agreement for this order.
          content:
            application/json:
              schema:
                type: object
                required: [communicationAgreement]
                properties:
                  communicationAgreement:
                    $ref: "#/components/schemas/OrderCommunicationAgreement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /orders/{orderId}/timeline:
    get:
      tags: [Orders]
      operationId: getOrderTimeline
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order timeline with milestone rows.
          content:
            application/json:
              schema:
                type: object
                required: [order, milestones]
                properties:
                  order:
                    $ref: "#/components/schemas/Order"
                  milestones:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrderMilestone"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /orders/{orderId}/milestones/{milestoneId}/submit:
    post:
      tags: [Orders]
      operationId: submitOrderMilestone
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
        - name: milestoneId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneSubmitRequest"
      responses:
        "200":
          description: Milestone submitted by seller.
          content:
            application/json:
              schema:
                type: object
                required: [order, milestone]
                properties:
                  order:
                    $ref: "#/components/schemas/Order"
                  milestone:
                    $ref: "#/components/schemas/OrderMilestone"
                  verification:
                    $ref: "#/components/schemas/MilestoneSubmitVerification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /orders/{orderId}/milestones/{milestoneId}/artifact-manifest:
    get:
      tags: [Orders]
      operationId: getMilestoneArtifactManifest
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
        - name: milestoneId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stored signed milestone artifact manifest (recipient scoped for non-seller actors).
          content:
            application/json:
              schema:
                type: object
                required: [artifactManifest]
                properties:
                  artifactManifest:
                    $ref: "#/components/schemas/MilestoneArtifactManifest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /orders/{orderId}/milestones/{milestoneId}/anchor:
    get:
      tags: [Orders]
      operationId: getMilestoneManifestAnchor
      parameters:
        - name: orderId
          in: path
          required: true
