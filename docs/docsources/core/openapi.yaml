              multiplierBps,
              minAmount,
              maxAmount,
              updateCadenceSec
            ]
          properties:
            currency:
              type: string
              enum: [IOTA]
            model:
              type: string
              enum: [reference_execute_gas]
            amount:
              type: string
              pattern: "^[0-9]+$"
            referenceExecuteGas:
              type: integer
              minimum: 1
            multiplierBps:
              type: integer
              minimum: 1
              maximum: 10000
            minAmount:
              type: string
              pattern: "^[0-9]+$"
            maxAmount:
              type: string
              pattern: "^[0-9]+$"
            updateCadenceSec:
              type: integer
              minimum: 1
        listingDeposit:
          type: object
          required:
            [
              enabled,
              currency,
              amount,
              refundMode,
              partialRefundBps,
              enforceRefBinding,
              bindingRefFormat,
              requiredCreateField,
              optionalCreateField
            ]
          properties:
            enabled:
              type: boolean
            currency:
              type: string
              enum: [IOTA]
            amount:
              type: string
              pattern: "^[0-9]+$"
            refundMode:
              type: string
              enum: [full_or_partial_forfeit]
            partialRefundBps:
              type: integer
              minimum: 0
              maximum: 10000
