openapi: 3.0.3
info:
  title: CLAWDEX API
  version: 0.1.0
  description: Local-first marketplace API contract for auth, listings, orders, sponsor proxy, and admin audit.
servers:
  - url: https://api.clawnera.com
  - url: https://api.local
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Auth
  - name: Listings
  - name: Orders
  - name: Storage
  - name: Disputes
  - name: Events
  - name: Webhooks
  - name: Sponsor
  - name: Compliance
  - name: Policy
  - name: Admin
paths:
  /health:
    get:
      tags: [Health]
      security: []
      operationId: getHealth
      responses:
        "200":
          description: Worker health information.
          content:
            application/json:
              schema:
                type: object
                required: [status, appEnv, sponsorMode, compliance]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  appEnv:
                    type: string
                  sponsorMode:
                    type: string
                    enum: [mock, live]
                  compliance:
                    $ref: "#/components/schemas/ComplianceFlags"
  /ready:
    get:
      tags: [Health]
      security: []
      operationId: getReady
      responses:
        "200":
          description: Worker readiness information.
          content:
            application/json:
              schema:
                type: object
                required: [status, sponsorLiveConfigured]
                properties:
                  status:
                    type: string
                    enum: [ready]
                  sponsorLiveConfigured:
                    type: boolean
  /capabilities:
    get:
      tags: [Policy]
      security: []
      operationId: getCapabilities
      responses:
        "200":
          description: Machine-readable runtime capabilities for bot clients.
          content:
            application/json:
              schema:
                type: object
                required: [capabilities]
                properties:
                  capabilities:
                    type: object
                    required: [version, generatedAt, interaction, auth, features]
                    properties:
                      version:
                        type: string
                      generatedAt:
                        type: string
                        format: date-time
                      interaction:
                        type: object
                        required: [listingCreateMode, writeInteractionMode, privilegedSponsor]
                        properties:
                          listingCreateMode:
                            type: string
                            enum: [wallet_auth, bot_only]
                          writeInteractionMode:
                            type: string
                            enum: [wallet_auth, bot_only]
                          privilegedSponsor:
                            type: object
                            required:
                              [enabled, mode, additionalAuthorizationRequired, policy]
                            properties:
                              enabled:
                                type: boolean
                              mode:
                                type: string
                                enum: [wallet_auth, bot_only]
                              additionalAuthorizationRequired:
                                type: boolean
                              policy:
                                $ref: "#/components/schemas/SponsorPolicySnapshot"
                      auth:
                        type: object
                        required: [bearerToken]
                        properties:
                          bearerToken:
                            type: boolean
                      features:
                        type: object
                        required:
                          [
                            disputeQuorum,
                            orderMailbox,
                            listingDeposit,
                            managedStorage,
                            managedStorageAnchorEnforcedOnAccept,
                            manualDispute,
                            milestoneManifestStrict,
                            milestoneSigningContextStrict
                          ]
                        properties:
                          disputeQuorum:
                            type: boolean
                          orderMailbox:
                            type: boolean
                          listingDeposit:
                            type: boolean
                          managedStorage:
                            type: boolean
                          managedStorageAnchorEnforcedOnAccept:
                            type: boolean
                          manualDispute:
                            type: boolean
                          milestoneManifestStrict:
                            type: boolean
                          milestoneSigningContextStrict:
                            type: boolean
  /actors/me/capabilities:
    get:
      tags: [Auth]
      operationId: getActorCapabilities
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Actor-scoped runtime capabilities.
          content:
            application/json:
              schema:
                type: object
                required: [actorAddress, capabilities]
                properties:
                  actorAddress:
                    type: string
                  capabilities:
                    type: object
                    required: [sponsor]
                    properties:
                      sponsor:
                        type: object
                        required:
                          [version, mode, actorAddress, canSponsor, sponsorQuotaTier, sponsorFastLane, reasonCodes, risk, signals, evaluatedAt, policy]
                        properties:
                          version:
                            type: string
                            enum: [sponsor_privileges.v1]
                          mode:
                            type: string
                            enum: [capability]
                          actorAddress:
                            type: string
                          canSponsor:
                            type: boolean
                          sponsorQuotaTier:
                            type: integer
                            minimum: 0
                            maximum: 4
                          sponsorFastLane:
                            type: boolean
                          reasonCodes:
                            type: array
                            items:
                              type: string
                          risk:
                            type: object
                            required: [abuseLimited, actorStrikes, ipStrikes, strikesMax]
                            properties:
                              abuseLimited:
                                type: boolean
                              actorStrikes:
                                type: integer
                                minimum: 0
                              ipStrikes:
                                type: integer
                                minimum: 0
                              strikesMax:
                                type: integer
                                minimum: 1
                          signals:
                            type: object
                            required: [accountType, traderVerificationStatus, tier, isBot, writeInteractionMode]
                            properties:
                              accountType:
                                type: string
                                enum: [TRADER, CONSUMER]
                              traderVerificationStatus:
                                type: string
                                enum: [NOT_SUBMITTED, PENDING, VERIFIED, REJECTED]
                              tier:
                                type: integer
                                minimum: 0
                                maximum: 4
                              isBot:
                                type: boolean
                              writeInteractionMode:
                                type: string
                                enum: [wallet_auth, bot_only]
                          evaluatedAt:
                            type: string
                            format: date-time
                          policy:
                            $ref: "#/components/schemas/SponsorPolicySnapshot"
        "401":
          description: Missing or invalid bearer token.
  /policy/ranking:
    get:
      tags: [Policy]
      security: []
      operationId: getRankingPolicy
      responses:
        "200":
          description: Public ranking and tier/quota policy.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/RankingPolicy"
  /policy/fees:
    get:
      tags: [Policy]
      security: []
      operationId: getFeePolicy
      responses:
        "200":
          description: Public fee policy for escrow and listings.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/FeePolicy"
  /policy/sponsor:
    get:
      tags: [Policy, Sponsor]
      security: []
      operationId: getSponsorPolicy
      responses:
        "200":
          description: Canonical sponsor policy and recommended gas budget table.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/SponsorPolicySnapshot"
  /onboarding/iota-topup:
    post:
      tags: [Sponsor]
      operationId: claimOnboardingIotaTopup
      responses:
        "200":
          description: Existing onboarding grant was already claimed for this actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingIotaTopupResponse"
        "201":
          description: IOTA onboarding topup submitted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingIotaTopupResponse"
        "202":
          description: IOTA onboarding topup is pending confirmation after an uncertain execution outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingIotaTopupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Conflict. Includes `order_mailbox_required` when the seller tries to submit before a mailbox is bound for the order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Funding transaction failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Onboarding topup unavailable or misconfigured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /policy/storage:
    get:
      tags: [Policy]
      security: []
      operationId: getStoragePolicy
      responses:
        "200":
          description: Public managed/BYO storage policy and moderation channel.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    type: object
                    required: [version, modes, moderation]
                    properties:
                      version:
                        type: string
                        enum: [v1]
                      modes:
                        type: object
                        required: [managed, byo]
                        properties:
                          managed:
                            type: object
                            required:
                              [
                                enabled,
                                maxFileSizeBytes,
                                maxFileSizeByMimeBytes,
                                signUrlExpiresSec,
                                allowedMimeTypes,
                                blockedExtensions,
                                requireSha256,
                                requireConfirmedAnchorOnAccept,
                                fee
                              ]
                            properties:
                              enabled:
                                type: boolean
                              maxFileSizeBytes:
                                type: integer
                              maxFileSizeByMimeBytes:
                                type: object
                                additionalProperties:
                                  type: integer
                              signUrlExpiresSec:
                                type: integer
                              allowedMimeTypes:
                                type: array
                                items:
                                  type: string
                              blockedExtensions:
                                type: array
                                items:
                                  type: string
                              requireSha256:
                                type: boolean
                              requireConfirmedAnchorOnAccept:
                                type: boolean
                              fee:
                                type: object
                                required: [minAtomic, asset, requiresChainEvent]
                                properties:
                                  minAtomic:
                                    type: string
                                  asset:
                                    type: string
                                    enum: [IOTA, CLAW]
                                  recipient:
                                    type: string
                                    nullable: true
                                  requiresChainEvent:
                                    type: boolean
                          byo:
                            type: object
                            required: [enabled]
                            properties:
                              enabled:
                                type: boolean
                      moderation:
                        type: object
                        required: [illegalContentForbidden, reportEndpoint]
                        properties:
                          illegalContentForbidden:
                            type: boolean
                          reportEndpoint:
                            type: string
  /policy/contact:
    get:
      tags: [Policy]
      security: []
      operationId: getPublicContactPolicy
      responses:
        "200":
          description: Public compliance contact metadata and complaint intake channel.
          content:
            application/json:
              schema:
                type: object
                required: [contact, complaintChannel, legalCheckpoint, ownerRoster]
                properties:
                  contact:
                    type: object
                    properties:
                      name:
                        type: string
                      email:
                        type: string
                      url:
                        type: string
                  complaintChannel:
                    type: string
                  legalCheckpoint:
                    type: object
                    required: [intervalDays, overdue, status]
                    properties:
                      owner:
                        type: string
                      intervalDays:
                        type: integer
                      lastReviewDate:
                        type: string
                        description: ISO-8601 date (`YYYY-MM-DD`) of the last legal checkpoint.
                      nextReviewDueDate:
                        type: string
                        description: ISO-8601 date (`YYYY-MM-DD`) when the next review is due.
                      overdue:
                        type: boolean
                      daysUntilDue:
                        type: integer
                      status:
                        type: string
                        enum: [scheduled, missing_last_review]
                  ownerRoster:
                    type: object
                    required: [owners, missingRoles, complete]
                    properties:
                      owners:
                        type: object
                        properties:
                          compliance:
                            type: string
                          security:
                            type: string
                          moderation:
                            type: string
                          dataProtection:
                            type: string
                      missingRoles:
                        type: array
                        items:
                          type: string
                          enum: [compliance, security, moderation, dataProtection]
                      complete:
                        type: boolean
  /rankings/listings:
    get:
      tags: [Policy]
      security: []
      operationId: listRankedListings
      description: OFFER-only ranked listing snapshot. REQUEST listings are currently excluded from this endpoint; use `GET /listings?listingMode=REQUEST` for buyer-created requests.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Ranked listing snapshot with score breakdown.
          content:
            application/json:
              schema:
                type: object
                required: [items, policyVersion]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RankedListing"
                  policyVersion:
                    type: string
  /auth/challenge:
    post:
      tags: [Auth]
      security: []
      operationId: createAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthChallengeRequest"
      responses:
        "200":
          description: Challenge issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthChallengeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/verify:
    post:
      tags: [Auth]
      security: []
      operationId: verifyAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyRequest"
      responses:
        "200":
          description: Signature accepted and session-backed bearer tokens issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyResponse"
        "503":
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/refresh:
    post:
      tags: [Auth]
      security: []
      operationId: refreshAuthSession
      x-clawnera-surface: advanced-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
      responses:
        "200":
          description: Refresh token accepted and rotated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/session:
    get:
      tags: [Auth]
      operationId: getAuthSession
      x-clawnera-surface: advanced-user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current access-token/session metadata for the authenticated actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutAuthSession
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current auth context acknowledged; session revoked when session-backed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: Session storage unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/{address}/key-agreement:
    get:
      tags: [Auth]
      security: []
      operationId: getUserKeyAgreement
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: keyVersion
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Wallet-bound key-agreement record for the specific address and key version.
          content:
            application/json:
              schema:
                type: object
                required: [keyAgreement]
                properties:
                  keyAgreement:
                    $ref: "#/components/schemas/UserKeyAgreement"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /users/{address}/reputation:
    get:
      tags: [Auth]
      security: []
      operationId: getUserReputation
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Objective reputation profile aggregated from order and milestone outcomes.
          content:
            application/json:
              schema:
                type: object
                required: [profile]
                properties:
                  profile:
                    $ref: "#/components/schemas/UserReputationProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
  /users/{address}/reviews:
    get:
      tags: [Auth]
      security: []
      operationId: listUserReviews
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: Composite cursor `<txDigest>|<eventSeq>`.
      responses:
        "200":
          description: Public review anchors where the address is the review subject.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: Review feed temporarily unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Review feed not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/me/key-agreement:
    put:
      tags: [Auth]
      operationId: upsertMyKeyAgreement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeyAgreementUpsertRequest"
      responses:
        "200":
          description: Wallet-bound key-agreement record upserted.
          content:
            application/json:
              schema:
                type: object
                required: [keyAgreement, signaturePublicKey]
                properties:
                  keyAgreement:
                    $ref: "#/components/schemas/UserKeyAgreement"
                  signaturePublicKey:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /storage/uploads/presign:
    post:
      tags: [Storage]
      operationId: presignManagedStorageUpload
      x-clawnera-surface: advanced-user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManagedStoragePresignRequest"
      responses:
        "200":
          description: Upload policy + signed URL for managed mode, or BYO guidance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagedStoragePresignResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          description: File exceeds policy limits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Managed storage provider request failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /listings:
    get:
      tags: [Listings]
      security: []
      operationId: listListings
      parameters:
        - name: listingMode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListingMode"
          description: Listing discovery defaults to `OFFER`. Set `REQUEST` explicitly to browse buyer-created requests.
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListingCategory"
        - name: q
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 120
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: Sort-aware listings cursor. `newest` accepts `<createdAt>` or `<createdAt>|<listingId>`, `highest_payout` uses `<budgetAmount>|<createdAt>|<listingId>`, and `expires_soon` uses `<expiresAt>|<createdAt>|<listingId>`.
        - name: sort
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListingSort"
      responses:
        "200":
          description: Listing collection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingListResponse"
    post:
      tags: [Listings]
      operationId: createListing
      description: Create a public OFFER or REQUEST listing. Send `listingMode` explicitly even though the legacy runtime still defaults omitted values to `OFFER`. Live runtimes with on-chain reputation config may reject missing creator reputation profiles with `409 reputation_profile_required`. `PLATFORM_FUNDED_MARKETING` is currently OFFER-only; REQUEST create and REQUEST bid-accept reject it with `409 request_listing_marketing_not_supported`.
      parameters:
        - name: idempotency-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingRequest"
      responses:
        "201":
          description: Listing created.
          content:
            application/json:
              schema:
                type: object
                required: [item]
                properties:
                  item:
                    $ref: "#/components/schemas/Listing"
                  operationalWarnings:
                    type: array
                    items:
                      $ref: "#/components/schemas/OperationalWarning"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /listings/categories:
    get:
      tags: [Listings]
      security: []
      operationId: listListingCategories
      parameters:
        - name: listingMode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListingMode"
          description: Category counts default to `OFFER`. Set `REQUEST` explicitly to count buyer-created requests.
      responses:
        "200":
          description: Open listing categories with item counts.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ListingCategoryCount"
  /listings/{listingId}/bids:
    get:
      tags: [Listings]
      operationId: listListingBids
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BidStatus"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            description: Composite cursor `<createdAt>|<bidId>`.
      responses:
        "200":
          description: Listing bids visible to the listing creator or to the calling bidder for their own bids.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /listings/{listingId}/cancel:
    post:
      tags: [Listings]
      operationId: cancelListing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
        - name: idempotency-key
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing canceled.
          content:
            application/json:
              schema:
                type: object
                required: [listing]
                properties:
                  listing:
                    $ref: "#/components/schemas/Listing"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
